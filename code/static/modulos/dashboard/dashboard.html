<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Monstruo Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/modulos/_compartido/css/monstruo.css?v=66.6" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#070b11">
</head>

<body class="sidebar-collapsed">
  <header id="app-header">
    <div class="header-top">
      <h1>MONSTRUO <span
          style="background: #ff4444; color: white; padding: 2px 6px; border-radius: 4px; font-size: 0.7em; margin-left: 10px; vertical-align: middle;">DEV</span>
      </h1>
      <button id="sidebar-toggle" class="btn-icon" title="Colapsar menú">
        <i class="fas fa-bars"></i>
      </button>
    </div>

    <nav id="dynamic-sidebar" class="side-nav">
    </nav>
    <div class="header-actions">
      <span id="who" class="pill"
        style="display:block; margin-bottom:10px; font-size:0.8rem; opacity:0.7;">Usuario</span>
      <div class="footer-buttons-container">
        <button id="btn-open-change-password" class="btn-account" title="Cambiar Contraseña">
          <i class="fas fa-key"></i> <span>Cuenta</span>
        </button>
        <button id="btnLogout" class="btn-logout" title="Cerrar Sesión">
          <i class="fas fa-sign-out-alt"></i> <span>Salir</span>
        </button>
      </div>
    </div>
  </header>

  <main>
    <div class="main-inner">
      <section class="section-block" id="section-general">
        <div class="section-header">
          <h3>Dashboard</h3>
          <p>Resumen Operativo Monstruo</p>
        </div>
        <style>
          .monstruo-dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-top: 1rem;
          }

        </style>
        <div class="monstruo-dashboard-grid">
          <div class="card card-terreno" style="cursor: default;">
            <i class="fas fa-chart-pie"></i>
            <h2>Operaciones</h2>
            <p>Vista General</p>
          </div>
          <div class="card card-supervisor" style="cursor: default;">
            <i class="fas fa-file-invoice-dollar"></i>
            <h2>Facturación</h2>
            <p>Cobranza</p>
          </div>
          <div class="card card-gerencia" style="cursor: default;">
            <i class="fas fa-users"></i>
            <h2>Clientes</h2>
            <p>Cartera</p>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script src="/modulos/_compartido/js/utilidades.js?v=203"></script>
  <script src="/modulos/_compartido/js/admin.js?v=4"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (window.initLogout) window.initLogout();
      loadDashboard();
      setInterval(loadDashboard, 30000); // 30s auto-refresh
    });

    async function loadDashboard() {
      try {
        const data = await window.fetchApi('/api/ops/dashboard');

        // Render KPIs
        const kpis = data.kpis;
        const salesCard = document.querySelector('.card-supervisor');
        salesCard.querySelector('p').innerHTML = `Hoy: ${kpis.sales_today_count} doc<br>$${new Intl.NumberFormat('es-CL').format(kpis.sales_today_amount)}`;

        const ticketsCard = document.querySelector('.card-terreno'); // Usar Terreno para Tickets? O ajustar iconos
        // Terreno Icon is chart-pie. Let's hijack it for Jobs or Tickets.
        // Let's assume Card 1 is Tickets, Card 2 Sales, Card 3 Customers

        // Update Card 1: Tickets
        const card1 = document.querySelectorAll('.card')[0];
        card1.innerHTML = `
            <i class="fas fa-ticket-alt"></i>
            <h2>${kpis.tickets_open} Tickets</h2>
            <p>${kpis.tickets_critical} Críticos</p>
        `;
        if (kpis.tickets_critical > 0) card1.style.borderLeft = "5px solid #ff4444";
        else card1.style.borderLeft = "none";

        // Update Card 2: Sales
        const card2 = document.querySelectorAll('.card')[1];
        card2.innerHTML = `
            <i class="fas fa-file-invoice-dollar"></i>
            <h2>$${new Intl.NumberFormat('es-CL', { notation: "compact" }).format(kpis.sales_today_amount)}</h2>
            <p>${kpis.sales_today_count} Ventas Hoy</p>
        `;

        // Update Card 3: Customers
        const card3 = document.querySelectorAll('.card')[2];
        card3.innerHTML = `
            <i class="fas fa-users"></i>
            <h2>${kpis.total_customers}</h2>
            <p>Clientes Activos</p>
        `;

        // System Status
        const header = document.querySelector('.section-header p');
        header.innerHTML = `Estado: <span class="pill ${data.system_status == 'healthy' ? 'pill-success' : 'pill-error'}">${data.system_status.toUpperCase()}</span>`;
        if (data.jobs_health.failures_24h > 0) {
          header.innerHTML += ` &bull; ${data.jobs_health.failures_24h} Fallas en Jobs (24h)`;
        }

        // Render Recent Failures Table (Bottom)
        let failContainer = document.getElementById('failures-container');
        if (!failContainer) {
          failContainer = document.createElement('div');
          failContainer.id = 'failures-container';
          failContainer.style.marginTop = '2rem';
          document.querySelector('.monstruo-dashboard-grid').after(failContainer);
        }

        if (data.recent_failures && data.recent_failures.length > 0) {
          let html = `<h4>⚠️ Alertas Recientes</h4><table class="monstruo-table" style="width:100%; margin-top:0.5rem"><thead><tr><th>Job</th><th>Error</th><th>Hora</th></tr></thead><tbody>`;
          data.recent_failures.forEach(f => {
            html += `<tr><td>${f.job_type}</td><td style="color:#d32f2f">${f.error_msg.substring(0, 50)}...</td><td>${f.started_at.substring(11, 16)}</td></tr>`;
          });
          html += `</tbody></table>`;
          failContainer.innerHTML = html;
        } else {
          failContainer.innerHTML += `<div style="margin-top:2rem; opacity:0.6; text-align:center"><i class="fas fa-check-circle" style="color:#00c851"></i> Todos los sistemas operativos</div>`;
        }

        // --- Ticketera V3 Widget ---
        try {
            const tksData = await window.fetchApi('/api/tks/dashboard/kpi');
            let tksContainer = document.getElementById('tks-widget-container');
            if (!tksContainer) {
                tksContainer = document.createElement('div');
                tksContainer.id = 'tks-widget-container';
                tksContainer.className = 'monstruo-dashboard-grid';
                tksContainer.style.marginTop = '2rem';
                tksContainer.style.gridTemplateColumns = '1fr 1fr'; 
                document.querySelector('.monstruo-dashboard-grid').after(tksContainer);
                
                // Add header for this section
                const tksHeader = document.createElement('div');
                tksHeader.innerHTML = '<h3>Ticketera 360°</h3>';
                tksHeader.style.marginTop = '2rem';
                tksContainer.before(tksHeader);
            }

            // Widget 1: Top Clientes
            let clientsHtml = `
                <div class="card" style="grid-column: span 1; cursor:default; align-items: flex-start; text-align: left;">
                    <div style="display:flex; justify-content:space-between; width:100%; margin-bottom:1rem">
                        <h4 style="margin:0"><i class="fas fa-building"></i> Top Clientes (Activos)</h4>
                    </div>
                    <table class="monstruo-table" style="width:100%; font-size:0.9rem">
                        <thead><tr><th>Cliente</th><th style="text-align:right">Tickets</th></tr></thead>
                        <tbody>
            `;
            if (tksData.top_clientes.length === 0) {
                clientsHtml += `<tr><td colspan="2" style="text-align:center; opacity:0.6">Sin actividad reciente</td></tr>`;
            } else {
                tksData.top_clientes.forEach(c => {
                    clientsHtml += `<tr><td>${c.cliente}</td><td style="text-align:right"><strong>${c.total}</strong></td></tr>`;
                });
            }
            clientsHtml += `</tbody></table></div>`;

            // Widget 2: Pendientes de Respuesta
            let emailsHtml = `
                <div class="card" style="grid-column: span 1; cursor:default; align-items: flex-start; text-align: left;">
                    <div style="display:flex; justify-content:space-between; width:100%; margin-bottom:1rem">
                        <h4 style="margin:0"><i class="fas fa-envelope-open-text"></i> Correos Pendientes</h4>
                    </div>
                    <table class="monstruo-table" style="width:100%; font-size:0.9rem">
                         <thead><tr><th>Asunto</th><th>Cliente</th><th>Hace</th></tr></thead>
                        <tbody>
            `;
             if (tksData.pending_emails.length === 0) {
                emailsHtml += `<tr><td colspan="3" style="text-align:center; opacity:0.6">Todo al día 🚀</td></tr>`;
            } else {
                tksData.pending_emails.forEach(e => {
                    const created = new Date(e.created_at);
                    const now = new Date();
                    const diffHrs = Math.round((now - created) / 36e5);
                    const timeStr = diffHrs > 24 ? `${Math.round(diffHrs/24)}d` : `${diffHrs}h`;
                    
                    emailsHtml += `
                        <tr style="cursor:pointer" onclick="window.location.href='/modulos/tks/tks.html?ticket_id=${e.id}'">
                            <td>${e.titulo.substring(0, 25)}...</td>
                            <td>${e.customer_id || '-'}</td>
                            <td style="color:${diffHrs > 4 ? '#ff4444' : 'inherit'}">${timeStr}</td>
                        </tr>`;
                });
            }
            emailsHtml += `</tbody></table></div>`;

            tksContainer.innerHTML = clientsHtml + emailsHtml;

        } catch (e) {
            console.warn("No se pudo cargar widget Ticketera/KPI:", e);
        }

      } catch (err) {
        console.error("Dashboard Error", err);
      }
    }
  </script>
  <script src="/modulos/_compartido/js/sidebar.js?v=8"></script>
</body>

</html>
