<div id="view-inventario" class="view-section active">
    <div class="kpi-grid">
        <div class="kpi-card"><span class="kpi-val" id="kpi-total">-</span><span class="kpi-lbl">Total Items</span></div>
        <div class="kpi-card"><span class="kpi-val" id="kpi-mapped">-</span><span class="kpi-lbl">Mapeados</span></div>
    </div>
    <div class="toolbar">
        <input type="text" id="inv-search" class="search-box" placeholder="Buscar en inventario..."
            oninput="window.handleSearchInput && window.handleSearchInput(this)">
        <button class="btn-icon" onclick="window.BodegaCore && window.BodegaCore.loadInventory && window.BodegaCore.loadInventory()">
            <i class="fas fa-sync-alt"></i>
        </button>
    </div>
    <div class="table-container">
        <table class="data-table" id="invTable">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Stock</th>
                                <th>Categorías</th>
                                <th>Match Catálogo</th>
                    <th>Acciones</th>
                </tr>
            </thead>
                            <tbody></tbody>
        </table>
    </div>
</div>
