<div class="kpi-row">
    <div class="kpi-card">
        <div class="kpi-val" id="totalDebt">$0</div>
        <div class="kpi-lbl">Deuda Total</div>
    </div>
    <div class="kpi-card">
        <div class="kpi-val" id="criticalDebt" style="color:var(--neon-red);">$0</div>
        <div class="kpi-lbl">Crítica (>60 d)</div>
    </div>
    <div class="kpi-card">
        <div class="kpi-val" id="debtorsCount">0</div>
        <div class="kpi-lbl">Clientes Deudores</div>
    </div>
</div>

<div class="filter-bar"
    style="background:var(--panel); padding:15px; border-radius:12px; margin-bottom:20px; display:flex; gap:10px; align-items:center;">
    <div style="flex:1;">
        <label style="font-size:0.8rem; opacity:0.7;">Buscar Cliente</label>
        <input type="text" id="debtorSearch" class="input-dark" style="width:100%;" placeholder="Nombre..."
            onkeyup="filterDebtors()">
    </div>
    <div style="width:200px;">
        <label style="font-size:0.8rem; opacity:0.7;">Riesgo Mínimo</label>
        <select id="riskFilter" class="input-dark" style="width:100%;" onchange="filterDebtors()">
            <option value="ALL">Todos</option>
            <option value="CRITICAL">Crítico (Rojo)</option>
            <option value="WARNING">Advertencia (Amarillo)</option>
        </select>
    </div>
    <button onclick="loadDebtors()" class="btn-primary" style="height:38px; margin-top:18px;">
        <i class="fas fa-sync"></i> Actualizar
    </button>
</div>

<div class="table-container">
    <table class="erp-table" id="debtorsTable">
        <thead>
            <tr>
                <th>Cliente</th>
                <th style="text-align:right">Deuda Total</th>
                <th style="text-align:right">Al Día / &lt;30</th>
                <th style="text-align:right">30-60 Días</th>
                <th style="text-align:right">&gt;60 Días</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tabla-debtors">
            <tr>
                <td colspan="6" style="text-align:center;">Cargando análisis de deuda...</td>
            </tr>
        </tbody>
    </table>
</div>

<!-- Modal Gestión -->
<dialog id="modal-gestion">
    <div
        style="padding:15px; border-bottom:1px solid #444; display:flex; justify-content:space-between; align-items:center; background:rgba(0,0,0,0.2);">
        <h4 style="margin:0;">Registrar Gestión</h4>
        <button onclick="document.getElementById('modal-gestion').close()"
            style="background:none; border:none; color:#aaa; cursor:pointer;"><i class="fas fa-times"></i></button>
    </div>
    <div style="padding:20px; display:flex; flex-direction:column; gap:15px;">
        <h3 id="modal-client-name" style="color:var(--neon);">Cliente</h3>

        <div>
            <label style="display:block; margin-bottom:5px; font-size:0.9rem; color:#ccc;">Tipo Acción</label>
            <select id="actionType" class="input-dark" style="width:100%;">
                <option value="CALL">Llamada Telefónica</option>
                <option value="EMAIL">Correo Enviado</option>
                <option value="WHATSAPP">WhatsApp</option>
            </select>
        </div>

        <div style="text-align:right;">
            <button class="btn-secondary" style="font-size:0.8rem; padding:4px 8px;" onclick="generarBorrador()">
                <i class="fas fa-magic"></i> Generar Borrador
            </button>
        </div>

        <div id="subject-container" style="display:none;">
            <label style="display:block; margin-bottom:5px; font-size:0.9rem; color:#ccc;">Asunto</label>
            <input type="text" id="emailSubject" class="input-dark" style="width:100%;">
        </div>


        <div>
            <label style="display:block; margin-bottom:5px; font-size:0.9rem; color:#ccc;">Notas / Compromiso</label>
            <textarea id="actionNotes" class="input-dark" style="width:100%; height:100px;"
                placeholder="Detalles de la gestión..."></textarea>
        </div>

        <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:10px;">
            <button class="btn-secondary" onclick="document.getElementById('modal-gestion').close()">Cancelar</button>
            <button class="btn-primary" onclick="guardarGestion()">Guardar</button>
        </div>
    </div>
</dialog>
