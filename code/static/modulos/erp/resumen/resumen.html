<div class="resumen-layout">
    <div class="kpi-row resumen-kpi-row">
        <div class="kpi-card">
            <div class="kpi-val kpi-val-sales" id="kpi-sales">--</div>
            <div class="kpi-lbl">Facturado (30d)</div>
        </div>
        <div class="kpi-card">
            <div class="kpi-val kpi-val-debt" id="kpi-debt">--</div>
            <div class="kpi-lbl">Vencido (&gt;30d)</div>
        </div>
        <div class="kpi-card">
            <div class="kpi-val kpi-val-cash" id="kpi-cash">--</div>
            <div class="kpi-lbl">Recaudado (30d)</div>
        </div>
    </div>

    <section class="debt-panel">
        <div class="debt-header">
            <div>
                <h3><i class="fas fa-users"></i> Estado de Clientes</h3>
                <span class="debt-subtitle">Cobranza y deuda vencida</span>
            </div>
            <button type="button" class="btn-secondary" onclick="window.initResumen && window.initResumen()">
                <i class="fas fa-sync"></i> Actualizar
            </button>
        </div>

        <div id="customerDebtList" class="debt-list">
            <div class="debt-empty"><i class="fas fa-circle-notch fa-spin"></i> Cargando clientes...</div>
        </div>
    </section>
</div>
