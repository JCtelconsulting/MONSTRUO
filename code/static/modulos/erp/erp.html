<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ERP & Finanzas | Monstruo</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/modulos/_compartido/css/monstruo.css?v=68.0" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/erp-shared.css" />
</head>

<body class="sidebar-collapsed">
    <header id="app-header">
        <div class="header-top">
            <h1>MONSTRUO</h1>
            <button id="sidebar-toggle" class="btn-icon"><i class="fas fa-bars"></i></button>
        </div>
        <nav id="dynamic-sidebar" class="side-nav"></nav>
        <div class="header-actions">
            <span id="who" class="pill"
                style="display:block; margin-bottom:10px; font-size:0.8rem; opacity:0.7;">Usuario</span>
            <div class="footer-buttons-container">
                <button id="btn-open-change-password" class="btn-account" title="Cambiar Contraseña">
                    <i class="fas fa-key"></i> <span>Cuenta</span>
                </button>
                <button id="btnLogout" class="btn-logout" title="Cerrar Sesión">
                    <i class="fas fa-sign-out-alt"></i> <span>Salir</span>
                </button>
            </div>
        </div>
    </header>

    <main>
        <div class="main-inner module-shell">
            <div class="section-header module-tabs-header module-shell-header">
                <div class="module-shell-title">
                    <h2 class="module-page-title">ERP & Finanzas</h2>
                    <p class="module-shell-subtitle">Gestión centralizada de operaciones financieras</p>
                </div>
            </div>

            <div class="tab-bar">
                <button class="tab-btn active" onclick="switchTab('resumen')">&#x1F4CA; Resumen</button>
                <button class="tab-btn" onclick="switchTab('clientes')">&#x1F465; Clientes</button>
                <button class="tab-btn" onclick="switchTab('facturacion')">&#x1F9FE; Facturación</button>
                <button class="tab-btn" onclick="switchTab('prefactura')">&#x1F4DD; Pre‑Factura</button>
                <button class="tab-btn" onclick="switchTab('conciliacion')">&#x1F501; Conciliación</button>
                <button class="tab-btn" onclick="switchTab('cobranza')">&#x1F4B0; Cobranza</button>
                <button class="tab-btn" onclick="switchTab('bancos')">&#x1F3E6; Bancos</button>
            </div>

            <section class="section-block module-shell-content">
                <!-- Tab Content Container -->
                <div id="tab-content-container"></div>
            </section>
        </div>
    </main>

    <script src="/modulos/_compartido/js/utilidades.js?v=203"></script>
    <script src="/modulos/_compartido/js/admin.js?v=4"></script>
    <script src="/modulos/_compartido/js/sidebar.js?v=8"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (window.initLogout) window.initLogout();
            switchTab('resumen');
        });

        let currentTab = null;
        const loadedResources = new Set();

        function switchTab(tabId) {
            // Update active button
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => {
                const onclick = el.getAttribute('onclick');
                if (onclick && onclick.includes(tabId)) el.classList.add('active');
            });

            // Load tab content if not already loaded
            if (currentTab !== tabId) {
                loadTabContent(tabId);
                currentTab = tabId;
            }
        }

        async function loadTabContent(tabName) {
            const container = document.getElementById('tab-content-container');

            try {
                // Load HTML
                const htmlResp = await fetch(`${tabName}/${tabName}.html?v=${Date.now()}`);
                if (!htmlResp.ok) throw new Error(`HTTP ${htmlResp.status}`);
                const html = await htmlResp.text();
                container.innerHTML = html;

                // Load CSS if not already loaded
                const cssKey = `css-${tabName}`;
                if (!loadedResources.has(cssKey)) {
                    const link = document.createElement('link');
                    link.rel = 'stylesheet';
                    link.href = `${tabName}/${tabName}.css?v=${Date.now()}`;
                    document.head.appendChild(link);
                    loadedResources.add(cssKey);
                }

                // Load JS (Always reload for dev)
                const existingScript = document.querySelector(`script[src*="${tabName}/${tabName}.js"]`);
                if (existingScript) existingScript.remove();

                const script = document.createElement('script');
                script.src = `${tabName}/${tabName}.js?v=${Date.now()}`;

                // IMPORTANT: Append to body to execute
                document.body.appendChild(script);

                // Wait for script to load
                await new Promise((resolve, reject) => {
                    script.onload = resolve;
                    script.onerror = () => resolve(); // Don't crash
                });

                // Call init functions
                if (tabName === 'resumen' && typeof window.initResumen === 'function') window.initResumen();
                if (tabName === 'clientes' && typeof window.initClientes === 'function') window.initClientes();
                if (tabName === 'facturacion' && typeof loadInvoices === 'function') loadInvoices();
                if (tabName === 'conciliacion' && typeof initBancos === 'function') initBancos();
                if (tabName === 'bancos' && typeof initBancosModule === 'function') initBancosModule();
                if (tabName === 'cobranza' && typeof loadDebtors === 'function') loadDebtors();
                if (tabName === 'prefactura' && typeof window.initPrefactura === 'function') window.initPrefactura();

            } catch (e) {
                console.error(`Error loading tab ${tabName}:`, e);
                container.innerHTML = `<div class="error-state">Error cargando ${tabName}: ${e.message}</div>`;
            }
        }
    </script>
</body>

</html>
