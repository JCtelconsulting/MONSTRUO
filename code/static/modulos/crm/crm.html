<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CRM | Monstruo</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/modulos/_compartido/css/monstruo.css?v=66.6" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Slide Over Styles */
        .slide-over-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 99;
            display: none;
            backdrop-filter: blur(2px);
        }

        .slide-over-panel {
            position: fixed;
            top: 0;
            right: -600px;
            width: 600px;
            height: 100%;
            background: #1a1f2c;
            z-index: 100;
            box-shadow: -5px 0 20px rgba(0, 0, 0, 0.5);
            transition: right 0.3s ease;
            display: flex;
            flex-direction: column;
            border-left: 1px solid rgba(255, 255, 255, 0.1);
        }

        .slide-over-panel.active {
            right: 0;
        }

        .panel-header {
            padding: 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-body {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
        }

        .crm-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .crm-tab {
            padding: 0.5rem 1rem;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            opacity: 0.6;
        }

        .crm-tab.active {
            border-bottom-color: var(--accent-color);
            opacity: 1;
            font-weight: 500;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 1rem;
            border-radius: 6px;
            text-align: center;
        }

        .stat-val {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .stat-lbl {
            font-size: 0.8rem;
            opacity: 0.7;
        }

        .timeline-item {
            padding-left: 1rem;
            border-left: 2px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 1rem;
            position: relative;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -5px;
            top: 5px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-color);
        }

        .tl-meta {
            font-size: 0.8rem;
            opacity: 0.5;
            margin-bottom: 0.2rem;
        }

        /* Table Aesthetics */
        .monstruo-table {
            border-collapse: separate;
            border-spacing: 0;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.2);
        }

        .monstruo-table th,
        .monstruo-table td {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px 16px;
        }

        .monstruo-table th {
            background: rgba(255, 255, 255, 0.1);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            color: #ccc;
        }

        .monstruo-table td {
            color: #eee;
        }

        .monstruo-table tr:last-child td {
            border-bottom: none;
        }

        .monstruo-table tr td:last-child,
        .monstruo-table tr th:last-child {
            border-right: none;
        }

        .monstruo-table tbody tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }
    </style>
</head>

<body class="sidebar-collapsed">
    <header id="app-header">
        <div class="header-top">
            <h1>MONSTRUO</h1>
            <button id="sidebar-toggle" class="btn-icon"><i class="fas fa-bars"></i></button>
        </div>
        <nav id="dynamic-sidebar" class="side-nav"></nav>
        <div class="header-actions">
            <span id="who" class="pill"
                style="display:block; margin-bottom:10px; font-size:0.8rem; opacity:0.7;">Usuario</span>
            <div class="footer-buttons-container">
                <button id="btn-open-change-password" class="btn-account" title="Cambiar Contraseña">
                    <i class="fas fa-key"></i> <span>Cuenta</span>
                </button>
                <button id="btnLogout" class="btn-logout" title="Cerrar Sesión">
                    <i class="fas fa-sign-out-alt"></i> <span>Salir</span>
                </button>
            </div>
        </div>
    </header>

    <main>
        <div class="main-inner">
            <section class="section-block">
                <div class="section-header">
                    <h3>Gestión de Clientes</h3>
                    <p>Búsqueda y visualización de cartera</p>
                </div>

                <div style="margin-bottom: 1.5rem; display: flex; gap: 1rem;">
                    <input type="text" id="crmSearch" placeholder="Buscar por Nombre o RUT..."
                        style="flex:1; padding:10px; border-radius:8px; background:rgba(255,255,255,0.05); color:white; border:1px solid rgba(255,255,255,0.1);">
                    <button onclick="loadCustomers()" class="btn-primary" style="padding: 0 20px;">Buscar</button>
                </div>

                <div class="table-container">
                    <table class="monstruo-table" id="customersTable" style="width:100%">
                        <thead>
                            <tr>
                                <th>Nombre</th>
                                <th>RUT</th>
                                <th>Email</th>
                                <th>Ciudad</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td colspan="5" style="text-align:center; opacity:0.5; padding:2rem;">Ingresa un
                                    criterio para buscar</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>

    <!-- SLIDE OVER COMPONENT -->
    <div class="slide-over-backdrop" id="slideBackdrop" onclick="closePanel()"></div>
    <div class="slide-over-panel" id="slidePanel">
        <div class="panel-header">
            <div>
                <h3 id="panelTitle" style="margin:0;">Cliente</h3>
                <small id="panelSubtitle" style="opacity:0.7;">RUT: 12.345.678-9</small>
            </div>
            <button class="btn-icon" onclick="closePanel()"><i class="fas fa-times"></i></button>
        </div>
        <div class="panel-body">
            <div class="crm-tabs">
                <div class="crm-tab active" onclick="switchTab('resumen')">Perfil</div>
                <div class="crm-tab" onclick="switchTab('bitacora')">Bitácora</div>
            </div>

            <div id="tab-resumen">
                <div style="background:rgba(255,255,255,0.05); padding:1rem; border-radius:6px; margin-bottom:1rem;">
                    <h4 style="margin-top:0;">Datos de Contacto</h4>
                    <p style="opacity:0.7; font-size:0.9rem;">
                        <i class="fas fa-map-marker-alt"></i> <span id="crmCity">-</span><br>
                        <i class="fas fa-envelope"></i> <span id="crmEmail">-</span><br>
                        <i class="fas fa-phone"></i> <span id="crmPhone">-</span>
                    </p>
                </div>
                <div style="background:rgba(255,255,100,0.1); padding:1rem; border-radius:4px; font-size:0.9rem;">
                    <i class="fas fa-info-circle"></i> Sincronizado con Laudus ERP
                </div>
            </div>


            <div id="tab-bitacora" style="display:none;">
                <div style="display:flex; gap:0.5rem; margin-bottom:1rem;">
                    <input type="text" id="noteInput" placeholder="Nueva nota rápida..."
                        style="flex:1; padding:8px; border-radius:4px; border:none;">
                    <button class="btn-primary" onclick="addNote()">Agregar</button>
                </div>
                <div id="timelineList">
                    <!-- Injected -->
                </div>
            </div>
        </div>
    </div>

    <script src="/modulos/_compartido/js/utilidades.js?v=203"></script>
    <script src="/modulos/_compartido/js/admin.js?v=4"></script>
    <script>
        let currentCustomer = null;

        document.addEventListener('DOMContentLoaded', () => {
            if (window.initLogout) window.initLogout();
            loadCustomers('');
        });

        async function loadCustomers() {
            const q = document.getElementById('crmSearch').value;
            const tbody = document.querySelector('#customersTable tbody');
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:2rem;">Cargando...</td></tr>';

            try {
                const res = await fetch(`/api/crm/customers?q=${encodeURIComponent(q)}`);
                if (!res.ok) throw new Error('Error buscando clientes');
                const data = await res.json();

                tbody.innerHTML = '';
                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:2rem; opacity:0.5;">No se encontraron clientes</td></tr>';
                    return;
                }

                data.forEach(c => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><b>${c.name}</b></td>
                        <td>${c.rut}</td>
                        <td>${c.email || '-'}</td>
                        <td>${c.city || '-'}</td>
                        <td>
                            <button class="btn-icon" onclick='openPanel(${JSON.stringify(c)})'><i class="fas fa-eye"></i></button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });

            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:red; padding:2rem;">${err.message}</td></tr>`;
            }
        }

        document.getElementById('crmSearch').addEventListener('keyup', (e) => {
            if (e.key === 'Enter') loadCustomers();
        });

        // --- Slide Over Logic ---
        async function openPanel(c) {
            currentCustomer = c;
            document.getElementById('slideBackdrop').style.display = 'block';
            setTimeout(() => document.getElementById('slidePanel').classList.add('active'), 10);

            document.getElementById('panelTitle').innerText = c.name;
            document.getElementById('panelSubtitle').innerText = `RUT: ${c.rut} | ID: ${c.id}`;

            // Populate Contact Info
            document.getElementById('crmCity').textContent = c.city || 'No registrada';
            document.getElementById('crmEmail').textContent = c.email || 'No registrado';
            document.getElementById('crmPhone').textContent = c.phone || 'No registrado';

            switchTab('resumen');
            loadTimeline(c.id);
        }

        function closePanel() {
            document.getElementById('slidePanel').classList.remove('active');
            setTimeout(() => document.getElementById('slideBackdrop').style.display = 'none', 300);
        }

        function switchTab(tabName) {
            ['resumen', 'bitacora'].forEach(t => {
                document.getElementById('tab-' + t).style.display = (t === tabName) ? 'block' : 'none';
            });
            // Simple logic for 2 tabs
            const tabs = document.querySelectorAll('.crm-tab');
            tabs[0].classList.toggle('active', tabName === 'resumen');
            tabs[1].classList.toggle('active', tabName === 'bitacora');
        }

    </script>
    <script src="/modulos/_compartido/js/sidebar.js?v=8"></script>
</body>

</html>
