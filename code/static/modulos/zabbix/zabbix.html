<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Zabbix | Monstruo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/modulos/_compartido/css/monstruo.css?v=66.6" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="js/zabbix.js" defer></script>
</head>

<body class="sidebar-collapsed">
    <header id="app-header">
        <div class="header-top">
            <h1>MONSTRUO</h1>
            <button id="sidebar-toggle" class="btn-icon" title="Colapsar menú">
                <i class="fas fa-bars"></i>
            </button>
        </div>
        <nav id="dynamic-sidebar" class="side-nav">
        </nav>
        <div class="header-actions">
            <span id="who" class="pill"
                style="display:block; margin-bottom:10px; font-size:0.8rem; opacity:0.7;">Usuario</span>
            <div class="footer-buttons-container">
                <button id="btn-open-change-password" class="btn-account" title="Cambiar Contraseña">
                    <i class="fas fa-key"></i> <span>Cuenta</span>
                </button>
                <button id="btnLogout" class="btn-logout" title="Cerrar Sesión">
                    <i class="fas fa-sign-out-alt"></i> <span>Salir</span>
                </button>
            </div>
        </div>
    </header>

    <main>
        <div class="main-inner">
            <section class="section-block">
                <div class="section-header">
                    <h3>Zabbix (Monitoreo)</h3>
                    <p>Estado general y problemas recientes</p>
                </div>
                <style>
                    .zbx-grid {
                        display: grid;
                        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
                        gap: 1rem;
                        margin-top: 1rem;
                    }
                    .zbx-card {
                        padding: 1rem;
                        border-radius: 12px;
                        background: rgba(10, 16, 24, 0.55);
                        border: 1px solid rgba(255, 255, 255, 0.08);
                    }
                    .zbx-table {
                        width: 100%;
                        border-collapse: collapse;
                        margin-top: 0.6rem;
                        font-size: 0.9rem;
                    }
                    .zbx-table th,
                    .zbx-table td {
                        text-align: left;
                        padding: 0.5rem 0.6rem;
                        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
                    }
                    .zbx-muted {
                        opacity: 0.7;
                    }
                </style>

                <div class="zbx-grid">
                    <div class="zbx-card">
                        <h4>Estado</h4>
                        <div id="zbx-estado" class="zbx-muted">Cargando...</div>
                        <div id="zbx-detalle" class="zbx-muted"></div>
                    </div>
                    <div class="zbx-card">
                        <h4>Problemas recientes</h4>
                        <div id="zbx-problemas-estado" class="zbx-muted">Cargando...</div>
                    </div>
                </div>

                <table class="zbx-table" id="zbx-problemas-tabla">
                    <thead>
                        <tr><th>Evento</th><th>Nombre</th><th>Severidad</th><th>Clock</th></tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </section>
        </div>
    </main>

    <script src="/modulos/_compartido/js/utilidades.js?v=203"></script>
    <script src="/modulos/_compartido/js/admin.js?v=4"></script>
    <script src="/modulos/_compartido/js/sidebar.js?v=6"></script>
</body>

</html>
