<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Modulo | Monstruo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/modulos/_compartido/css/monstruo.css?v=66.3" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body class="sidebar-collapsed">
    <header id="app-header">
        <div class="header-top">
            <h1>MONSTRUO</h1>
            <button id="sidebar-toggle" class="btn-icon" title="Colapsar menú">
                <i class="fas fa-bars"></i>
            </button>
        </div>
        <nav id="dynamic-sidebar" class="side-nav">
        </nav>
        <div class="header-actions">
            <span class="pill">MONSTRUO V1</span>
            <button id="btnLogout" class="btn-logout" title="Cerrar Sesión"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </header>

    <main>
        <div class="main-inner">
            <section class="section-block">
                <div class="section-header">
                    <h3>Configuración</h3>
                    <p>Parámetros centrales del sistema</p>
                </div>

                <div class="panel" style="padding:20px;">
                    <h3><i class="fas fa-envelope"></i> Cobranza · Configuración SMTP</h3>
                    <p style="opacity:0.7; font-size:0.9rem; margin-bottom:15px;">
                        Esta configuración pertenece al flujo de <strong>Cobranza</strong> (envío de facturas y recordatorios).
                    </p>

                    <div style="display:grid; grid-template-columns: 2fr 1fr; gap:15px;">
                        <div>
                            <label style="display:block; font-size:0.8rem; margin-bottom:5px;">Host SMTP</label>
                            <input type="text" id="smtpHost" class="input-dark" placeholder="smtp.gmail.com" style="width:100%;">
                        </div>
                        <div>
                            <label style="display:block; font-size:0.8rem; margin-bottom:5px;">Puerto</label>
                            <input type="number" id="smtpPort" class="input-dark" placeholder="587" style="width:100%;">
                        </div>
                    </div>

                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-top:15px;">
                        <div>
                            <label style="display:block; font-size:0.8rem; margin-bottom:5px;">Usuario / Correo</label>
                            <input type="text" id="smtpUser" class="input-dark" placeholder="cobranza@..." style="width:100%;">
                        </div>
                        <div>
                            <label style="display:block; font-size:0.8rem; margin-bottom:5px;">Contraseña / App Password</label>
                            <input type="password" id="smtpPass" class="input-dark" placeholder="********" style="width:100%;">
                        </div>
                    </div>

                    <div style="margin-top:15px; text-align:right;">
                        <button class="btn-primary" id="btnSaveSmtp">
                            <i class="fas fa-save"></i> Guardar SMTP de Cobranza
                        </button>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script src="/modulos/_compartido/js/utilidades.js?v=202"></script>
    <script src="/modulos/_compartido/js/admin.js?v=3"></script>
    <!-- NO portal.js here -->
    <script>
        async function loadSmtpConfig() {
            try {
                const data = await window.fetchApi('/api/config/smtp');
                if (data) {
                    document.getElementById('smtpHost').value = data.smtp_host || '';
                    document.getElementById('smtpPort').value = data.smtp_port || '';
                    document.getElementById('smtpUser').value = data.smtp_user || '';
                    document.getElementById('smtpPass').value = data.smtp_password || '';
                }
            } catch (e) {
                console.error("Error loading SMTP config", e);
            }
        }

        async function saveSmtpConfig() {
            const host = document.getElementById('smtpHost').value.trim();
            const port = document.getElementById('smtpPort').value.trim();
            const user = document.getElementById('smtpUser').value.trim();
            const pass = document.getElementById('smtpPass').value;

            try {
                await window.fetchApi('/api/config/smtp', {
                    method: 'POST',
                    body: {
                        smtp_host: host,
                        smtp_port: port,
                        smtp_user: user,
                        smtp_password: pass
                    }
                });
                alert('Configuración SMTP de Cobranza guardada.');
            } catch (e) {
                console.error(e);
                alert('Error al guardar configuración SMTP.');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (window.initLogout) window.initLogout();
            document.title = "Configuración | Monstruo";
            const saveBtn = document.getElementById('btnSaveSmtp');
            if (saveBtn) saveBtn.addEventListener('click', saveSmtpConfig);
            loadSmtpConfig();
        });
    </script>
    <script src="/modulos/_compartido/js/sidebar.js?v=6"></script>
</body>

</html>
