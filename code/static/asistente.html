<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Monstruo - Copilot</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .chat-box { height: 400px; overflow-y: auto; background: rgba(0,0,0,0.3); border: 1px solid #333; padding: 10px; margin-bottom: 10px; }
    .msg { margin-bottom: 8px; padding: 6px; border-radius: 4px; }
    .msg.user { background: rgba(0,255,0,0.1); text-align: right; }
    .msg.ai { background: rgba(0,0,255,0.1); text-align: left; }
    .msg.sys { color: #888; font-size: 0.8rem; text-align: center; }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-title">MONSTRUO</div>
        <div class="brand-sub">Asistente IA</div>
      </div>
      <nav class="nav">
        <a class="nav-item" href="/ui/home.html">Panel Principal</a>
        <a class="nav-item active" href="#">Asistente</a>
      </nav>
      <div class="sidebar-foot">
        <button class="btn btn-ghost" onclick="location.href='/ui/'">Volver</button>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <h1 class="h1">Asistente</h1>
        <div class="muted">Safe, Read-Only, PII Redacted</div>
      </header>
      
      <div class="card">
        <div class="card-body">
           <div class="chat-box" id="chat">
              <div class="msg sys">Welcome to Monstruo Copilot. AI configuration: <span id="aiConfig">...</span></div>
           </div>
           <div class="row">
              <input class="input" id="prompt" placeholder="Pregunta algo..." onkeyup="if(event.key=='Enter') send()" />
              <button class="btn" onclick="send()">Enviar</button>
           </div>
           <div class="row" style="margin-top:10px;">
              <button class="btn btn-ghost" onclick="suggest()">Sugerir Próximas Acciones</button>
           </div>
        </div>
      </div>
    </main>
  </div>

<script>
const API = location.origin;
const $ = (id) => document.getElementById(id);
function authHeaders() { return { "Authorization": "Bearer " + localStorage.getItem("token"), "Content-Type": "application/json" }; }

function addMsg(txt, cls) {
    const d = document.createElement("div");
    d.className = "msg " + cls;
    d.innerText = txt;
    $("chat").appendChild(d);
    $("chat").scrollTop = $("chat").scrollHeight;
}

async function send() {
    const q = $("prompt").value.trim();
    if(!q) return;
    addMsg(q, "user");
    $("prompt").value = "";
    
    try {
        const res = await fetch(API+"/ai/ask", {
            method: "POST", headers: authHeaders(),
            body: JSON.stringify({query: q, context_data: { page: "copilot" }})
        });
        const d = await res.json();
        if(d.error) {
            addMsg(`[${d.error}] ${d.message || ""}`, "sys");
        } else {
            addMsg(d.content, "ai");
        }
    } catch(e) {
        addMsg("Error connecting", "sys");
    }
}

async function suggest() {
    addMsg("Requesting suggestions...", "sys");
    try {
        const res = await fetch(API+"/ai/suggest-next", { method: "POST", headers: authHeaders() });
        const d = await res.json();
        if(d.error) addMsg(`[${d.error}]`, "sys");
        else addMsg(d.content, "ai");
    } catch(e) { addMsg("Error", "sys"); }
}

// Check if AI is configured (by making a dummy call or just trying)
// For now assume skipped
$("aiConfig").innerText = "Checking...";
fetch(API+"/ai/suggest-next", { method: "POST", headers: authHeaders() }).then(r=>r.json()).then(d => {
    if(d.error === "AI_SKIPPED") $("aiConfig").innerText = "Not Configured (Local Mode)";
    else $("aiConfig").innerText = "Ready";
});
</script>
</body>
</html>
