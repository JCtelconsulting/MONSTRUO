<div class="gta-catalogo">

    <div class="gta-catalogo-header">
        <div>
            <p class="gta-catalogo-intro">Elige el tipo de solicitud que necesitas. El sistema te guiará paso a paso según el proceso definido.</p>
        </div>
        <div style="display:flex; gap:10px; align-items:center;">
            <input type="text" id="catalogo-search" class="input-dark" placeholder="&#xf002; Buscar proceso..."
                oninput="Catalogo.filtrar(this.value)" style="min-width:220px;">
        </div>
    </div>

    <!-- Filtro por área -->
    <div class="gta-area-pills" id="catalogo-area-pills">
        <button class="gta-area-pill active" data-area="" onclick="Catalogo.filtrarArea(this)">Todas</button>
        <button class="gta-area-pill" data-area="comercial" onclick="Catalogo.filtrarArea(this)">Comercial</button>
        <button class="gta-area-pill" data-area="preventa" onclick="Catalogo.filtrarArea(this)">Preventa</button>
        <button class="gta-area-pill" data-area="redes" onclick="Catalogo.filtrarArea(this)">Redes</button>
        <button class="gta-area-pill" data-area="sistemas" onclick="Catalogo.filtrarArea(this)">Sistemas</button>
        <button class="gta-area-pill" data-area="finanzas" onclick="Catalogo.filtrarArea(this)">Finanzas</button>
        <button class="gta-area-pill" data-area="proveedores" onclick="Catalogo.filtrarArea(this)">Proveedores</button>
        <button class="gta-area-pill" data-area="capital_humano" onclick="Catalogo.filtrarArea(this)">Capital Humano</button>
        <button class="gta-area-pill" data-area="bodega" onclick="Catalogo.filtrarArea(this)">Bodega</button>
        <button class="gta-area-pill" data-area="ia" onclick="Catalogo.filtrarArea(this)">Especialista IA</button>
    </div>

    <!-- Grid de procesos -->
    <div class="gta-catalogo-grid" id="catalogo-grid">
        <div class="gta-loading"><i class="fas fa-spinner fa-spin"></i> Cargando catálogo...</div>
    </div>

    <!-- Sin proceso -->
    <div class="gta-catalogo-footer">
        <span>¿No encuentras lo que necesitas?</span>
        <button class="btn-secondary" onclick="GtaCore.abrirModalQuiebre()">
            <i class="fas fa-flag"></i> Reportar quiebre de proceso
        </button>
    </div>
</div>
