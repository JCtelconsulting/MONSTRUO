<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GTA | Monstruo</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared/css/monstruo.css?v=75" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/gta.css?v=5" />
</head>

<body class="sidebar-collapsed gta-shell" data-current-module="gta">
    <header id="app-header">
        <div class="header-top">
            <h1>MONSTRUO</h1>
            <button id="sidebar-toggle" class="btn-icon"><i class="fas fa-bars"></i></button>
        </div>
        <nav id="dynamic-sidebar" class="side-nav"></nav>
        <div class="header-actions">
            <span id="who" class="pill shell-who-pill">Usuario</span>
            <div class="footer-buttons-container">
                <button id="btn-open-change-password" class="btn-account" title="Cambiar Contraseña">
                    <i class="fas fa-key"></i> <span>Cuenta</span>
                </button>
                <button id="btnLogout" class="btn-logout" title="Cerrar Sesión">
                    <i class="fas fa-sign-out-alt"></i> <span>Salir</span>
                </button>
            </div>
        </div>
    </header>

    <main>
        <div class="main-inner module-shell">
            <div class="section-header module-tabs-header module-shell-header">
                <div class="module-shell-title">
                    <h2 class="module-page-title">Gestión de Tareas Automatizadas (GTA)</h2>
                    <p class="module-shell-subtitle">Operación de procesos y flujos cross-área</p>
                </div>
            </div>

            <!-- TAB BAR -->
            <div class="tab-bar">
                <button class="tab-btn active" data-tab="tablero" onclick="GtaCore.loadTab('tablero', this)">
                    <i class="fas fa-columns"></i> Tablero
                </button>
                <button class="tab-btn" data-tab="procesos" onclick="GtaCore.loadTab('procesos', this)">
                    <i class="fas fa-folder-tree"></i> Procesos
                </button>
            </div>

            <section class="section-block module-shell-content">
                <!-- CONTENIDO DINÁMICO -->
                <div id="tab-content"></div>
            </section>
        </div>
    </main>

    <script src="shared/js/utilidades.js?v=210"></script>
    <script src="shared/js/admin.js?v=5"></script>
    <script src="shared/js/sidebar.js?v=89"></script>
    <script src="js/gta_api.js?v=5"></script>
    <script src="js/gta_ui.js?v=5"></script>
    <script src="js/gta_main.js?v=5"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (window.initLogout) window.initLogout();
            GtaCore.init();
        });
    </script>
</body>
</html>
