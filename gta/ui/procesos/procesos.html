<div class="gta-procesos">

    <div class="gta-procesos-header">
        <div>
            <p style="color:var(--text-soft); font-size:0.9rem;">
                Define y administra los tipos de solicitud. Cada proceso tiene pasos, área responsable y SLA opcional.
            </p>
        </div>
        <button class="btn-primary" id="btn-nuevo-proceso" onclick="Procesos.abrirFormulario(null)">
            <i class="fas fa-plus"></i> Nuevo Proceso
        </button>
    </div>

    <!-- Filtros -->
    <div class="gta-tablero-filters" style="margin-bottom:16px;">
        <input type="text" id="procesos-search" class="input-dark" placeholder="Buscar proceso..."
            oninput="Procesos.filtrar(this.value)" style="min-width:220px;">
        <select id="procesos-filtro-area" class="input-dark" onchange="Procesos.filtrar()" style="min-width:160px;">
            <option value="">Todas las áreas</option>
            <option value="comercial">Comercial</option>
            <option value="preventa">Preventa</option>
            <option value="redes">Redes</option>
            <option value="sistemas">Sistemas</option>
            <option value="finanzas">Finanzas</option>
            <option value="proveedores">Proveedores</option>
            <option value="capital_humano">Capital Humano</option>
            <option value="bodega">Bodega</option>
            <option value="ia">Especialista IA</option>
        </select>
        <select id="procesos-filtro-estado" class="input-dark" onchange="Procesos.filtrar()" style="min-width:130px;">
            <option value="activo">Activos</option>
            <option value="">Todos</option>
            <option value="inactivo">Inactivos</option>
        </select>
    </div>

    <!-- Tabla de procesos -->
    <div class="table-scroll">
        <table class="monstruo-table" id="procesos-tabla">
            <thead>
                <tr>
                    <th>Proceso</th>
                    <th>Área</th>
                    <th>Pasos</th>
                    <th>SLA</th>
                    <th>Solicitudes</th>
                    <th>Estado</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="procesos-tbody">
                <tr><td colspan="7" style="text-align:center; padding:2rem; color:var(--text-soft);">
                    <i class="fas fa-spinner fa-spin"></i> Cargando procesos...
                </td></tr>
            </tbody>
        </table>
    </div>

    <!-- Modal: Crear/Editar Proceso -->
    <div class="modal-backdrop" id="modal-proceso">
        <div class="modal-content" style="max-width:640px; max-height:90vh; overflow-y:auto;">
            <div class="modal-header">
                <h2 id="modal-proceso-titulo">Nuevo Proceso</h2>
                <button class="modal-close-btn" onclick="Procesos.cerrarFormulario()">×</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="proceso-id">
                <div class="form-grid-4">
                    <div class="field">
                        <label>Nombre del proceso</label>
                        <input type="text" id="proceso-nombre" class="input-dark" placeholder="Ej: Solicitud de equipo">
                    </div>
                    <div class="field">
                        <label>Área responsable</label>
                        <select id="proceso-area" class="input-dark">
                            <option value="">Selecciona...</option>
                            <option value="comercial">Comercial</option>
                            <option value="preventa">Preventa</option>
                            <option value="redes">Redes</option>
                            <option value="sistemas">Sistemas</option>
                            <option value="finanzas">Finanzas</option>
                            <option value="proveedores">Proveedores</option>
                            <option value="capital_humano">Capital Humano</option>
                            <option value="bodega">Bodega</option>
                            <option value="ia">Especialista IA</option>
                        </select>
                    </div>
                </div>
                <div class="field" style="margin-bottom:14px;">
                    <label>Descripción</label>
                    <textarea id="proceso-descripcion" class="input-dark" rows="2"
                        placeholder="¿Para qué sirve este proceso?"></textarea>
                </div>
                <div class="form-grid-4" style="margin-bottom:14px;">
                    <div class="field">
                        <label>SLA (horas, opcional)</label>
                        <input type="number" id="proceso-sla" class="input-dark" placeholder="Ej: 48" min="1">
                    </div>
                    <div class="field">
                        <label>Icono (Font Awesome)</label>
                        <input type="text" id="proceso-icono" class="input-dark" placeholder="Ej: fa-laptop">
                    </div>
                </div>

                <!-- Pasos del proceso -->
                <div class="field">
                    <label style="display:flex; justify-content:space-between; align-items:center;">
                        Pasos del proceso
                        <button type="button" class="btn-sm" onclick="Procesos.agregarPaso()">
                            <i class="fas fa-plus"></i> Agregar paso
                        </button>
                    </label>
                    <div id="proceso-pasos-lista" style="margin-top:10px; display:flex; flex-direction:column; gap:8px;">
                        <!-- Pasos inyectados por JS -->
                    </div>
                </div>

                <!-- Campos adicionales del formulario de solicitud -->
                <div class="field" style="margin-top:14px;">
                    <label style="display:flex; justify-content:space-between; align-items:center;">
                        Campos del formulario de solicitud
                        <button type="button" class="btn-sm" onclick="Procesos.agregarCampo()">
                            <i class="fas fa-plus"></i> Agregar campo
                        </button>
                    </label>
                    <div id="proceso-campos-lista" style="margin-top:10px; display:flex; flex-direction:column; gap:8px;">
                        <!-- Campos inyectados por JS -->
                    </div>
                </div>
            </div>
            <div class="modal-footer" style="display:flex; justify-content:flex-end; gap:10px; margin-top:20px;">
                <button class="btn-secondary" onclick="Procesos.cerrarFormulario()">Cancelar</button>
                <button class="btn-primary" onclick="Procesos.guardar()">
                    <i class="fas fa-save"></i> Guardar Proceso
                </button>
            </div>
        </div>
    </div>
</div>
