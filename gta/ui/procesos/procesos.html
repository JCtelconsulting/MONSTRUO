<div class="gta-procs">
    <div class="gta-area-pills" id="procs-area-pills" style="margin-bottom:12px;">
        <button class="gta-area-pill active" data-area="" onclick="Procesos.filtrarArea(this)">Todas</button>
    </div>

    <div class="gta-procs-content" id="procs-content">
        <div class="gta-loading"><i class="fas fa-spinner fa-spin"></i> Cargando procesos...</div>
    </div>
</div>

<!-- Modal detalle de proceso (vista + edición) -->
<div class="modal-backdrop" id="modal-proceso">
    <div class="modal-content gta-proc-modal">
        <div class="modal-header">
            <div>
                <div class="gta-flujo-drawer-eyebrow" id="proc-modal-eyebrow">Proceso</div>
                <h2 id="proc-modal-titulo">Cargando...</h2>
            </div>
            <button class="modal-close-btn" onclick="Procesos.cerrarModal()">×</button>
        </div>
        <div class="modal-body" id="proc-modal-body">
            <div class="gta-loading"><i class="fas fa-spinner fa-spin"></i></div>
        </div>
        <div class="modal-footer" id="proc-modal-footer"></div>
    </div>
</div>

<!-- Modal: Iniciar flujo (formulario obligatorio) -->
<div class="modal-backdrop" id="modal-iniciar-flujo">
    <div class="modal-content" style="max-width:820px;">
        <div class="modal-header">
            <div>
                <div class="gta-flujo-drawer-eyebrow">Iniciar flujo del proceso</div>
                <h2 id="iniciar-flujo-titulo-proceso">—</h2>
            </div>
            <button class="modal-close-btn" onclick="Procesos.cerrarIniciarFlujo()">×</button>
        </div>
        <div class="modal-body">
            <div class="field">
                <label>Título del flujo <span style="color:var(--danger);">*</span></label>
                <input type="text" id="iniciar-flujo-titulo" class="input-dark" placeholder="Ej: Cliente ABC Corp">
                <small class="gta-section-help">Identifica esta ejecución del proceso (cliente, proyecto, etc.).</small>
            </div>
            <div id="iniciar-flujo-campos"></div>
        </div>
        <div class="modal-footer">
            <button class="btn-secondary" onclick="Procesos.cerrarIniciarFlujo()">Cancelar</button>
            <button class="btn-primary" onclick="Procesos.confirmarIniciarFlujo()">
                <i class="fas fa-rocket"></i> Iniciar flujo
            </button>
        </div>
    </div>
</div>

<!-- Modal: Preview de documento (guía del proceso) -->
<div class="modal-backdrop" id="modal-doc-preview">
    <div class="modal-content" style="max-width:min(1100px, 92vw); max-height:90vh; display:flex; flex-direction:column;">
        <div class="modal-header">
            <div>
                <div class="gta-flujo-drawer-eyebrow">Guía original del proceso</div>
                <h2 id="doc-preview-title">Documento</h2>
            </div>
            <button class="modal-close-btn" onclick="Procesos.cerrarDocPreview()">×</button>
        </div>
        <div class="modal-body" id="doc-preview-body" style="flex:1; overflow:auto;">
            <div class="gta-loading"><i class="fas fa-spinner fa-spin"></i> Cargando documento…</div>
        </div>
        <div class="modal-footer" id="doc-preview-footer"></div>
    </div>
</div>

<!-- Modal: Reportar quiebre asociado a proceso -->
<div class="modal-backdrop" id="modal-quiebre-proc">
    <div class="modal-content" style="max-width:640px;">
        <div class="modal-header">
            <h2>Reportar quiebre</h2>
            <button class="modal-close-btn" onclick="Procesos.cerrarQuiebre()">×</button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="quiebre-proc-id">
            <p class="gta-section-help" id="quiebre-proc-info"></p>
            <div class="field" style="margin-top:10px;">
                <label>Descripción del problema *</label>
                <textarea id="quiebre-proc-desc" class="input-dark" rows="3" placeholder="¿Qué pasó? ¿Qué no funciona del proceso?"></textarea>
            </div>
            <div class="field" style="margin-top:10px;">
                <label>Área involucrada *</label>
                <select id="quiebre-proc-area" class="input-dark"></select>
            </div>
            <div class="field" style="margin-top:10px;">
                <label>Tipo</label>
                <select id="quiebre-proc-tipo" class="input-dark">
                    <option value="sin_proceso">Falta proceso definido</option>
                    <option value="paso_bloqueado">Paso bloqueado</option>
                    <option value="sla_vencido">SLA vencido</option>
                </select>
            </div>
        </div>
        <div class="modal-footer" style="display:flex; justify-content:flex-end; gap:10px; margin-top:20px;">
            <button class="btn-secondary" onclick="Procesos.cerrarQuiebre()">Cancelar</button>
            <button class="btn-primary" onclick="Procesos.guardarQuiebre()">
                <i class="fas fa-flag"></i> Reportar
            </button>
        </div>
    </div>
</div>
