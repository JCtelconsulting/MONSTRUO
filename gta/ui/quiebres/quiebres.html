<div class="gta-quiebres">

    <div class="gta-quiebres-intro">
        <div class="gta-quiebres-intro-text">
            <i class="fas fa-exclamation-triangle" style="color:var(--warning); margin-right:8px;"></i>
            Solicitudes sin proceso definido, pasos bloqueados o SLA vencido. Requieren atención del responsable de área o gerencia.
        </div>
        <button class="btn-secondary" onclick="Quiebres.cargar()">
            <i class="fas fa-sync-alt"></i> Actualizar
        </button>
    </div>

    <!-- Filtros -->
    <div class="gta-tablero-filters" style="margin-bottom:16px;">
        <select id="quiebres-filtro-tipo" class="input-dark" onchange="Quiebres.filtrar()" style="min-width:180px;">
            <option value="">Todos los tipos</option>
            <option value="sin_proceso">Sin proceso definido</option>
            <option value="paso_bloqueado">Paso bloqueado</option>
            <option value="sla_vencido">SLA vencido</option>
        </select>
        <select id="quiebres-filtro-area" class="input-dark" onchange="Quiebres.filtrar()" style="min-width:160px;">
            <option value="">Todas las áreas</option>
            <option value="comercial">Comercial</option>
            <option value="preventa">Preventa</option>
            <option value="redes">Redes</option>
            <option value="sistemas">Sistemas</option>
            <option value="finanzas">Finanzas</option>
            <option value="proveedores">Proveedores</option>
            <option value="capital_humano">Capital Humano</option>
            <option value="bodega">Bodega</option>
            <option value="ia">Especialista IA</option>
        </select>
        <select id="quiebres-filtro-estado" class="input-dark" onchange="Quiebres.filtrar()" style="min-width:160px;">
            <option value="abierto">Abiertos</option>
            <option value="">Todos</option>
            <option value="resuelto">Resueltos</option>
        </select>
    </div>

    <!-- Lista de quiebres -->
    <div id="quiebres-lista">
        <div class="gta-loading"><i class="fas fa-spinner fa-spin"></i> Cargando quiebres...</div>
    </div>
</div>
