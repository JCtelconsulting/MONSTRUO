<div class="gta-docs">
    <div class="gta-docs-header">
        <div>
            <p class="gta-docs-intro">Procesos y procedimientos descargados desde Drive. Filtra por área, busca por nombre y descarga el archivo original.</p>
        </div>
        <div style="display:flex; gap:10px; align-items:center;">
            <span class="gta-docs-counter" id="docs-counter">—</span>
            <input type="text" id="docs-search" class="input-dark" placeholder="🔍 Buscar archivo..." oninput="Documentos.filtrar(this.value)" style="min-width:240px;">
        </div>
    </div>

    <div class="gta-area-pills" id="docs-area-pills">
        <button class="gta-area-pill active" data-area="" onclick="Documentos.filtrarArea(this)">Todas</button>
    </div>

    <div class="gta-docs-content" id="docs-content">
        <div class="gta-loading"><i class="fas fa-spinner fa-spin"></i> Cargando catálogo de documentos...</div>
    </div>
</div>
