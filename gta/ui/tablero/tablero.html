<div class="gta-tablero">
    <!-- KPIs -->
    <div class="gta-kpi-row" id="tablero-kpis">
        <div class="gta-kpi-card">
            <div class="gta-kpi-val" id="kpi-activos">—</div>
            <div class="gta-kpi-lbl">Flujos activos</div>
        </div>
        <div class="gta-kpi-card kpi-warning">
            <div class="gta-kpi-val" id="kpi-por-validar">—</div>
            <div class="gta-kpi-lbl">Por validar</div>
        </div>
        <div class="gta-kpi-card kpi-danger">
            <div class="gta-kpi-val" id="kpi-vencidos">—</div>
            <div class="gta-kpi-lbl">Tareas vencidas</div>
        </div>
        <div class="gta-kpi-card kpi-ok">
            <div class="gta-kpi-val" id="kpi-completados">—</div>
            <div class="gta-kpi-lbl">Completados</div>
        </div>
    </div>

    <!-- Filtros -->
    <div class="gta-tablero-filters">
        <select id="filtro-area" class="input-dark" onchange="Tablero.filtrar()" style="min-width:160px;">
            <option value="">Todas las áreas</option>
        </select>
        <select id="filtro-estado" class="input-dark" onchange="Tablero.filtrar()" style="min-width:160px;">
            <option value="">Todos los estados</option>
            <option value="activo">Activos</option>
            <option value="completado">Completados</option>
            <option value="vencido">Vencidos</option>
        </select>
        <input type="text" id="filtro-busqueda" class="input-dark" placeholder="🔍 Buscar..." oninput="Tablero.filtrar()" style="min-width:200px;">
        <button class="btn-secondary" onclick="Tablero.cargar()" title="Refrescar">
            <i class="fas fa-sync-alt"></i>
        </button>
    </div>

    <!-- Kanban por estado del flujo -->
    <div class="gta-flujos-kanban" id="tablero-kanban">
        <div class="gta-loading"><i class="fas fa-spinner fa-spin"></i> Cargando flujos...</div>
    </div>
</div>

<!-- Drawer de detalle de flujo -->
<div id="flujo-drawer" class="gta-flujo-drawer">
    <div class="gta-flujo-drawer-header">
        <div>
            <div class="gta-flujo-drawer-eyebrow" id="flujo-drawer-codigo">Flujo</div>
            <h3 id="flujo-drawer-titulo">Cargando...</h3>
        </div>
        <button class="btn-icon" onclick="Tablero.cerrarDrawer()"><i class="fas fa-times"></i></button>
    </div>
    <div class="gta-flujo-drawer-body" id="flujo-drawer-body">
        <div class="gta-loading"><i class="fas fa-spinner fa-spin"></i></div>
    </div>
</div>
<div id="flujo-drawer-overlay" class="gta-flujo-drawer-overlay" onclick="Tablero.cerrarDrawer()"></div>

<!-- Modal: Pedir ayuda -->
<div class="modal-backdrop" id="modal-pedir-ayuda">
    <div class="modal-content" style="max-width:560px;">
        <div class="modal-header">
            <h2>Pedir ayuda</h2>
            <button class="modal-close-btn" onclick="Tablero.cerrarModalAyuda()">×</button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="ayuda-tarea-id">
            <div class="field">
                <label>Área a la que pides ayuda *</label>
                <select id="ayuda-area" class="input-dark"></select>
            </div>
            <div class="field" style="margin-top:12px;">
                <label>Mensaje *</label>
                <textarea id="ayuda-mensaje" class="input-dark" rows="3" placeholder="¿Qué necesitas?"></textarea>
            </div>
            <div class="field" style="margin-top:12px;">
                <label class="gta-checkbox-label">
                    <input type="checkbox" id="ayuda-bloquea-sla">
                    <span>Pausar SLA (la tarea es dependencia oficial del proceso)</span>
                </label>
                <p class="gta-section-help" style="margin-top:6px;">Marca esto solo si la otra área es responsable directa del paso. Si es solo orientación o consulta, déjalo desmarcado.</p>
            </div>
        </div>
        <div class="modal-footer" style="display:flex; justify-content:flex-end; gap:10px; margin-top:20px;">
            <button class="btn-secondary" onclick="Tablero.cerrarModalAyuda()">Cancelar</button>
            <button class="btn-primary" onclick="Tablero.enviarAyuda()">
                <i class="fas fa-hands-helping"></i> Enviar
            </button>
        </div>
    </div>
</div>
