<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fundación | Monstruo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../shared/css/monstruo.css?v=ASSET_VERSION" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="css/fundacion.css?v=ASSET_VERSION" />
</head>

<body class="sidebar-collapsed fundacion-shell" data-current-module="fundacion">
    <header id="app-header">
        <div class="header-top">
            <h1>MONSTRUO</h1>
            <button id="sidebar-toggle" class="btn-icon" title="Colapsar menú">
                <i class="fas fa-bars"></i>
            </button>
        </div>
        <nav id="dynamic-sidebar" class="side-nav"></nav>
        <div class="header-actions">
            <span id="who" class="pill shell-who-pill">Usuario</span>
            <div class="footer-buttons-container">
                <button id="btn-open-change-password" class="btn-account" title="Cambiar Contraseña">
                    <i class="fas fa-key"></i> <span>Cuenta</span>
                </button>
                <button id="btnLogout" class="btn-logout" title="Cerrar Sesión">
                    <i class="fas fa-sign-out-alt"></i> <span>Salir</span>
                </button>
            </div>
        </div>
    </header>

    <main>
        <div class="main-inner module-shell">
            <div class="section-header module-tabs-header module-shell-header">
                <div class="module-shell-title">
                    <h2 class="module-page-title">Fundación</h2>
                    <p class="module-shell-subtitle">Operación territorial — sedes, planificación, bodegas y reportería</p>
                </div>
                <div class="module-shell-actions">
                    <div id="fund-sede-context" class="fund-sede-context" aria-live="polite">
                        <label for="fund-sede-select">Sede</label>
                        <select id="fund-sede-select" class="input-dark">
                            <option value="">— Cargando —</option>
                        </select>
                        <span id="fund-sede-lock" class="fund-sede-lock" hidden title="No podés cambiar de sede">
                            <i class="fas fa-lock"></i>
                        </span>
                    </div>
                </div>
            </div>

            <div class="tab-bar">
                <button class="tab-btn active" data-tab="planificacion" onclick="FundCore.loadTab('planificacion', this)">
                    <i class="fas fa-calendar-alt"></i> Planificación
                </button>
                <button class="tab-btn" data-tab="bodegas" onclick="FundCore.loadTab('bodegas', this)">
                    <i class="fas fa-boxes-stacked"></i> Bodegas
                </button>
                <button class="tab-btn" data-tab="reporteria" onclick="FundCore.loadTab('reporteria', this)">
                    <i class="fas fa-chart-line"></i> Reportería
                </button>
                <button class="tab-btn fund-tab-admin" data-tab="configuracion" hidden onclick="FundCore.loadTab('configuracion', this)">
                    <i class="fas fa-cog"></i> Configuración
                </button>
            </div>

            <section class="section-block module-shell-content">
                <div id="tab-content"></div>
            </section>
        </div>
    </main>

    <script src="../shared/js/utilidades.js?v=ASSET_VERSION"></script>
    <script src="../shared/js/admin.js?v=ASSET_VERSION"></script>
    <script src="../shared/js/sidebar.js?v=ASSET_VERSION"></script>
    <script src="js/fundacion_api.js?v=ASSET_VERSION"></script>
    <script src="js/fundacion_main.js?v=ASSET_VERSION"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (window.initLogout) window.initLogout();
            FundCore.init();
        });
    </script>
</body>

</html>
