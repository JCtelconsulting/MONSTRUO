<div class="fund-pane" data-pane="planificacion">
    <div class="fund-pane-head plan-head">
        <div>
            <h3 id="plan-sede-title">Planificación</h3>
            <p id="plan-sede-subtitle" class="fund-pane-sub">Registro diario de bloques y clima por sede</p>
        </div>
        <div class="plan-actions">
            <label class="plan-nivel-label">
                <i class="fa-solid fa-layer-group"></i>
                <select id="plan-nivel" class="input-dark"></select>
            </label>
            <button id="plan-btn-plan-oficial" class="btn-secondary" title="Descartar lo editado y recargar el plan oficial">
                <i class="fa-solid fa-rotate-left"></i> Recargar plan oficial
            </button>
            <button id="plan-btn-guardar" class="btn-primary">
                <i class="fa-solid fa-floppy-disk"></i> Guardar
            </button>
        </div>
    </div>

    <div id="plan-needs-sede" class="fund-empty" style="display:none;">
        <i class="fas fa-school"></i>
        <p>Selecciona una sede arriba para registrar su día.</p>
    </div>

    <div id="plan-shell" style="display:none;">

        <!-- Calendario -->
        <section class="plan-section plan-cal-section">
            <div class="plan-cal-toolbar">
                <div class="plan-cal-nav">
                    <button class="btn-icon" id="plan-cal-prev" title="Anterior">
                        <i class="fa-solid fa-chevron-left"></i>
                    </button>
                    <button class="btn-icon" id="plan-cal-next" title="Siguiente">
                        <i class="fa-solid fa-chevron-right"></i>
                    </button>
                    <h4 id="plan-cal-title" class="plan-cal-title">—</h4>
                    <button class="btn-sm plan-cal-today-btn" id="plan-cal-today" hidden>
                        <i class="fa-solid fa-arrow-rotate-left"></i> Volver a hoy
                    </button>
                </div>
                <div class="plan-cal-view-tabs" role="tablist">
                    <button class="plan-cal-view-btn" data-view="mes">Mes</button>
                    <button class="plan-cal-view-btn" data-view="semana">Semana</button>
                    <button class="plan-cal-view-btn is-active" data-view="dia">Día</button>
                </div>
            </div>
            <div id="plan-cal-body" class="plan-cal-body"></div>
        </section>

        <!-- Separador del editor del día seleccionado -->
        <div class="plan-editor-header" id="plan-editor-header">
            <h4>
                <i class="fa-solid fa-pen-to-square"></i>
                Sesión del <span id="plan-editor-fecha-label">—</span>
            </h4>
        </div>

        <!-- Clima del día -->
        <section class="plan-section plan-clima-section">
            <div class="plan-section-head">
                <h4><i class="fa-solid fa-cloud-sun"></i> Clima y convivencia del día</h4>
            </div>
            <div class="plan-clima-grid" id="plan-clima-grid"></div>
            <div class="plan-clima-meta">
                <label class="plan-clima-meta-col1">
                    <span class="plan-field-lbl">Situaciones relevantes</span>
                    <textarea id="plan-situaciones" class="input-dark" rows="2"
                              placeholder="Ej: conflicto entre niños al inicio; energía baja después de la colación"></textarea>
                </label>
                <label class="plan-clima-meta-col2">
                    <span class="plan-field-lbl">Estrategias aplicadas</span>
                    <textarea id="plan-estrategias" class="input-dark" rows="2"
                              placeholder="Qué hizo la monitora frente a esas situaciones"></textarea>
                </label>
                <label class="plan-clima-meta-full">
                    <span class="plan-field-lbl">Notas adicionales</span>
                    <textarea id="plan-notas" class="input-dark" rows="2"></textarea>
                </label>
            </div>
        </section>

        <!-- Bloques del día -->
        <section class="plan-section plan-bloques-section">
            <div class="plan-section-head">
                <h4><i class="fa-solid fa-layer-group"></i> Bloques del día</h4>
                <div class="plan-section-head-actions">
                    <button id="plan-btn-collapse-all" class="btn-sm" title="Colapsar todos">
                        <i class="fa-solid fa-compress"></i> Colapsar
                    </button>
                    <button id="plan-btn-expand-all" class="btn-sm" title="Expandir todos">
                        <i class="fa-solid fa-expand"></i> Expandir
                    </button>
                    <button id="plan-btn-add-bloque" class="btn-sm">
                        <i class="fa-solid fa-plus"></i> Agregar bloque
                    </button>
                </div>
            </div>
            <div id="plan-bloques-lista" class="plan-bloques-lista">
                <p class="plan-bloques-empty">Sin bloques cargados. Usa "Plantilla del día" para los 6 estándar o "Agregar bloque" para uno por uno.</p>
            </div>
        </section>
    </div>
</div>

<!-- Plantilla HTML que el JS clona para cada bloque (colapsable) -->
<template id="tpl-bloque">
    <details class="plan-bloque" data-bloque-idx="" open>
        <summary class="plan-bloque-summary">
            <i class="fa-solid fa-chevron-right plan-bloque-chevron"></i>
            <span class="plan-bloque-orden">#<span data-role="orden-label">1</span></span>
            <span class="plan-bloque-tipo-tag" data-role="tipo-label">—</span>
            <span class="plan-bloque-subtipo-tag" data-role="subtipo-label"></span>
            <span class="plan-bloque-hora-tag" data-role="hora-label"></span>
            <span class="plan-bloque-actividad-label" data-role="actividad-label"></span>
            <span class="plan-bloque-status" data-role="status-label"></span>
            <button type="button" class="btn-icon btn-danger-soft plan-bloque-del" data-role="del" title="Eliminar bloque">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </summary>

        <div class="plan-bloque-body">
            <!-- Fila 1: tipo + subtipo + horas + ejecutado -->
            <div class="plan-bloque-controls">
                <div class="plan-control">
                    <span class="plan-field-lbl">Tipo de bloque</span>
                    <select data-role="tipo" class="input-dark"></select>
                </div>
                <div class="plan-control" data-role="subtipo-control" style="display:none;">
                    <span class="plan-field-lbl">Subtipo</span>
                    <select data-role="subtipo" class="input-dark"></select>
                </div>
                <div class="plan-control plan-control-horas">
                    <span class="plan-field-lbl">Horario</span>
                    <div class="plan-horas-row">
                        <input type="time" data-role="hora-inicio" class="input-dark" />
                        <span class="plan-horas-sep">–</span>
                        <input type="time" data-role="hora-fin" class="input-dark" />
                    </div>
                </div>
                <div class="plan-control plan-control-ejec">
                    <span class="plan-field-lbl">Ejecución</span>
                    <label class="plan-bloque-ejecutado">
                        <input type="checkbox" data-role="se-ejecuto" checked />
                        <span>Se ejecutó</span>
                    </label>
                </div>
            </div>

            <!-- Actividad (con autocomplete contra el catálogo) -->
            <label class="plan-bloque-row plan-actividad-row">
                <span class="plan-field-lbl">Actividad
                    <span class="plan-actividad-fuente" data-role="actividad-fuente"></span>
                </span>
                <div class="plan-actividad-wrap">
                    <input type="text" data-role="actividad" class="input-dark"
                           autocomplete="off"
                           placeholder='Empieza a escribir para buscar en el catálogo…' />
                    <div class="plan-actividad-suggest" data-role="actividad-suggest" hidden></div>
                </div>
            </label>

            <!-- Resultado de aprendizaje (solo bloques que permiten competencias) -->
            <label class="plan-bloque-row" data-role="resultado-row">
                <span class="plan-field-lbl">Resultado de aprendizaje</span>
                <textarea data-role="resultado" class="input-dark" rows="2"></textarea>
            </label>

            <!-- Competencias agrupadas por dominio -->
            <div class="plan-bloque-row" data-role="competencias-row">
                <div class="plan-field-lbl-row">
                    <span class="plan-field-lbl">Competencias trabajadas</span>
                    <span class="plan-comp-counter" data-role="comp-counter"></span>
                </div>
                <div class="plan-comp-domains" data-role="competencias"></div>
            </div>

            <!-- Materiales -->
            <div class="plan-bloque-row">
                <div class="plan-field-lbl-row">
                    <span class="plan-field-lbl">Materiales</span>
                    <button type="button" class="btn-link" data-role="add-material">
                        <i class="fa-solid fa-plus"></i> Agregar
                    </button>
                </div>
                <div data-role="materiales" class="plan-mat-list"></div>
            </div>

            <!-- Motivo no ejecutado (oculto si se ejecutó) -->
            <div class="plan-bloque-row plan-bloque-no-ejec" data-role="no-ejec-row" style="display:none;">
                <label>
                    <span class="plan-field-lbl">Motivo por el que no se ejecutó</span>
                    <input type="text" data-role="motivo" class="input-dark" />
                </label>
            </div>

            <!-- Adaptación -->
            <label class="plan-bloque-row">
                <span class="plan-field-lbl">Adaptación realizada</span>
                <textarea data-role="adaptacion" class="input-dark" rows="2"
                          placeholder="Cambios al plan original, qué no resultó, mejoras del momento"></textarea>
            </label>
        </div>
    </details>
</template>

<!-- Plantilla HTML para una fila de material -->
<template id="tpl-material">
    <div class="plan-mat-row">
        <input type="text" data-role="nombre" class="input-dark" placeholder="Material (ej: témperas, pelota, cartulina)" />
        <input type="number" step="0.01" data-role="qsol" class="input-dark plan-mat-num" placeholder="Solicitado" />
        <input type="number" step="0.01" data-role="qusa" class="input-dark plan-mat-num" placeholder="Usado" />
        <button type="button" class="btn-icon btn-danger-soft" data-role="del-mat" title="Quitar material">
            <i class="fa-solid fa-xmark"></i>
        </button>
    </div>
</template>
