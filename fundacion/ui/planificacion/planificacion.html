<div class="fund-pane" data-pane="planificacion">
    <div class="fund-pane-head plan-head">
        <div>
            <h3 id="plan-sede-title">Planificación</h3>
            <p id="plan-sede-subtitle" class="fund-pane-sub">Registro diario de bloques y clima por sede</p>
        </div>
        <div class="plan-actions">
            <label class="plan-fecha-label">
                <i class="fa-regular fa-calendar"></i>
                <input type="date" id="plan-fecha" class="input-dark" />
            </label>
            <button id="plan-btn-sugerir" class="btn-secondary" title="Cargar plantilla de 6 bloques estándar">
                <i class="fa-solid fa-wand-magic-sparkles"></i> Plantilla del día
            </button>
            <button id="plan-btn-guardar" class="btn-primary">
                <i class="fa-solid fa-floppy-disk"></i> Guardar
            </button>
        </div>
    </div>

    <div id="plan-needs-sede" class="fund-empty" style="display:none;">
        <i class="fas fa-school"></i>
        <p>Selecciona una sede arriba para registrar su día.</p>
    </div>

    <div id="plan-shell" style="display:none;">
        <!-- Clima del día -->
        <section class="plan-section plan-clima-section">
            <div class="plan-section-head">
                <h4><i class="fa-solid fa-cloud-sun"></i> Clima y convivencia del día</h4>
            </div>
            <div class="plan-clima-grid" id="plan-clima-grid"></div>
            <div class="plan-clima-meta">
                <label>
                    <span class="plan-field-lbl">Situaciones relevantes</span>
                    <textarea id="plan-situaciones" class="input-dark" rows="2"
                              placeholder="Ej: conflicto entre niños al inicio; energía baja después de la colación"></textarea>
                </label>
                <label>
                    <span class="plan-field-lbl">Estrategias aplicadas</span>
                    <textarea id="plan-estrategias" class="input-dark" rows="2"
                              placeholder="Qué hizo la monitora frente a esas situaciones"></textarea>
                </label>
                <label>
                    <span class="plan-field-lbl">Notas adicionales</span>
                    <textarea id="plan-notas" class="input-dark" rows="2"></textarea>
                </label>
            </div>
        </section>

        <!-- Bloques del día -->
        <section class="plan-section plan-bloques-section">
            <div class="plan-section-head">
                <h4><i class="fa-solid fa-layer-group"></i> Bloques del día</h4>
                <button id="plan-btn-add-bloque" class="btn-secondary btn-sm">
                    <i class="fa-solid fa-plus"></i> Agregar bloque
                </button>
            </div>
            <div id="plan-bloques-lista" class="plan-bloques-lista">
                <p class="plan-bloques-empty">Sin bloques cargados. Usa "Plantilla del día" para los 6 estándar o "Agregar bloque" para uno por uno.</p>
            </div>
        </section>
    </div>
</div>

<!-- Plantilla HTML que el JS clona para cada bloque -->
<template id="tpl-bloque">
    <article class="plan-bloque" data-bloque-idx="">
        <header class="plan-bloque-head">
            <span class="plan-bloque-orden">#<span data-role="orden">1</span></span>
            <select data-role="tipo" class="input-dark plan-bloque-tipo"></select>
            <select data-role="subtipo" class="input-dark plan-bloque-subtipo" style="display:none;"></select>
            <div class="plan-bloque-horas">
                <input type="time" data-role="hora-inicio" class="input-dark" title="Hora inicio" />
                <span>–</span>
                <input type="time" data-role="hora-fin" class="input-dark" title="Hora fin" />
            </div>
            <label class="plan-bloque-ejecutado">
                <input type="checkbox" data-role="se-ejecuto" checked />
                <span>Se ejecutó</span>
            </label>
            <button type="button" class="btn-icon btn-danger-soft" data-role="del" title="Eliminar bloque">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </header>
        <div class="plan-bloque-body">
            <label class="plan-bloque-row">
                <span class="plan-field-lbl">Actividad</span>
                <input type="text" data-role="actividad" class="input-dark"
                       placeholder='Ej: "Pelota de la amistad", "Just dance", "Mural de la felicidad"' />
            </label>
            <label class="plan-bloque-row" data-role="resultado-row">
                <span class="plan-field-lbl">Resultado de aprendizaje</span>
                <textarea data-role="resultado" class="input-dark" rows="2"></textarea>
            </label>
            <div class="plan-bloque-row" data-role="competencias-row">
                <span class="plan-field-lbl">Competencias trabajadas</span>
                <div class="plan-comp-grid" data-role="competencias"></div>
            </div>
            <div class="plan-bloque-row">
                <span class="plan-field-lbl">Materiales</span>
                <div data-role="materiales" class="plan-mat-list"></div>
                <button type="button" class="btn-link" data-role="add-material">
                    <i class="fa-solid fa-plus"></i> Agregar material
                </button>
            </div>
            <div class="plan-bloque-row plan-bloque-no-ejec" data-role="no-ejec-row" style="display:none;">
                <label>
                    <span class="plan-field-lbl">Motivo por el que no se ejecutó</span>
                    <input type="text" data-role="motivo" class="input-dark" />
                </label>
            </div>
            <label class="plan-bloque-row">
                <span class="plan-field-lbl">Adaptación realizada</span>
                <textarea data-role="adaptacion" class="input-dark" rows="2"
                          placeholder="Cambios al plan original, qué no resultó, mejoras del momento"></textarea>
            </label>
        </div>
    </article>
</template>

<!-- Plantilla HTML para una fila de material -->
<template id="tpl-material">
    <div class="plan-mat-row">
        <input type="text" data-role="nombre" class="input-dark" placeholder="Material (ej: témperas, pelota, cartulina)" />
        <input type="number" step="0.01" data-role="qsol" class="input-dark plan-mat-num" placeholder="Solicitado" />
        <input type="number" step="0.01" data-role="qusa" class="input-dark plan-mat-num" placeholder="Usado" />
        <button type="button" class="btn-icon btn-danger-soft" data-role="del-mat" title="Quitar material">
            <i class="fa-solid fa-xmark"></i>
        </button>
    </div>
</template>
