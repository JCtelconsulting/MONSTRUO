version: '3.8'

services:
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: terreneitor_app
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - ../backend:/app/backend
      - ../frontend:/app/frontend
      - ../data:/app/data
      - ../logs:/app/logs
    env_file:
      - ../ops/environments/.env
    environment:
      - PYTHONUNBUFFERED=1
    user: "${PUID:-1000}:${PGID:-1000}"
    restart: unless-stopped
