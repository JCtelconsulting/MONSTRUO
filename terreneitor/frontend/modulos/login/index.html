<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acceso | TERRENEITOR</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Dosis:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/login.css?v=21.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link
      rel="icon"
      type="image/png"
      href="../_compartido/img/logo/telconsulting-isotipo-dorado.png"
    />
  </head>

  <body>
    <div class="login-container">
      <div class="login-card">
        <div class="card-header">
          <img
            src="../_compartido/img/logo/telconsulting-completo-dorado.png"
            alt="Telconsulting"
            class="brand-logo"
          />
        </div>

        <div class="google-login-section">
          <button type="button" id="btnGoogle" class="btn-google">
            <img
              src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
              alt="Google logo"
            />
            Continuar con Google
          </button>
        </div>

        <div class="login-separator">O entrar con credenciales</div>

        <form id="loginForm" action="javascript:void(0);" method="post" novalidate>
          <div class="form-group">
            <label for="email">Identificacion</label>
            <input
              type="email"
              id="email"
              placeholder="usuario@telconsulting.cl"
              required
              autocomplete="email"
            />
          </div>

          <div class="form-group">
            <label for="password">Credencial</label>
            <input
              type="password"
              id="password"
              placeholder="********"
              required
              autocomplete="current-password"
            />
          </div>

          <button type="button" id="btnLogin" class="btn-login">Iniciar Sesion</button>

          <div id="status" class="modal-status"></div>
        </form>
      </div>
      <div class="sys-id">SYS.VER.6.4</div>
    </div>

    <script src="../_compartido/js/utilidades.js?v=413"></script>
    <script src="js/login.js?v=411"></script>
  </body>
</html>
