# Terreneitor como módulo de Monstruo (DEV, VM 60.8).
#
# Compose propio (no el raíz) a propósito: el repo está a mitad de un hotfix de
# ticketera y no se toca el docker-compose.yaml raíz; cuando ese trabajo aterrice,
# este servicio se pliega al compose raíz (bloque listo en docs/MIGRACION_MONSTRUO.md).
#
# - Puerto host 8005 -> 8000: el proxy (60.6) ya apunta terreneitor dev a 60.8:8005,
#   así que NO hay cambios de proxy.
# - Red externa monstruo-dev_default: ve al Postgres central como `db:5432`.
# - ENV/cookies/SECRET propios en ops/environments/.env (no commiteado).
#
# Levantar:  docker compose -f /srv/monstruo_dev/terreneitor/docker-compose.yaml up -d --build
services:
  terreneitor:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: monstruo-dev-terreneitor
    ports:
      - "8005:8000"
    volumes:
      - ./backend:/app/backend
      - ./frontend:/app/frontend
      - ./data:/app/data
      - ./logs:/app/logs
    env_file:
      - ./ops/environments/.env
    environment:
      - PYTHONUNBUFFERED=1
      - ENV=dev
    user: "1000:1000"
    restart: unless-stopped

networks:
  default:
    external: true
    name: monstruo-dev_default
