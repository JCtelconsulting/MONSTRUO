name: Seguridad - Analisis de Vulnerabilidades

on:
  push:
    branches: [main, dev]
  schedule:
    # Lunes a las 9 AM UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar herramientas de seguridad
        run: |
          python -m pip install --upgrade pip
          python -m pip install bandit safety

      - name: Analisis de codigo con Bandit
        run: |
          bandit -r backend/ -f json -o bandit-report.json || true
          bandit -r backend/ -f txt
        continue-on-error: true

      - name: Analisis de dependencias con Safety
        run: |
          safety check --file backend/requirements.txt --json > safety-report.json || true
          safety check --file backend/requirements.txt
        continue-on-error: true

      - name: Escaneo de filesystem con Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "table"
          exit-code: "0"
          ignore-unfixed: true
          severity: "CRITICAL,HIGH"

      - name: Subir reportes de seguridad
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          if-no-files-found: warn
          path: |
            bandit-report.json
            safety-report.json
