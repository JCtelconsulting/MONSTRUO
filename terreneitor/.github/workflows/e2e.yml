name: E2E - Smoke Tests

# Se dispara despues que el CI pasa, contra una instancia local que se levanta
# en el runner. Si los tests E2E rompen, el deploy NO se ejecuta porque
# deploy.yml escucha CI completion (no E2E). Pero al menos te avisa con X roja.
on:
  workflow_run:
    workflows: ["CI - Tests y Linting"]
    types: [completed]
    branches: [main, dev]
  workflow_dispatch:

jobs:
  e2e-smoke:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    timeout-minutes: 15

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt
            e2e/requirements.txt

      - name: Instalar dependencias backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt

      - name: Instalar dependencias E2E
        run: |
          python -m pip install -r e2e/requirements.txt
          playwright install chromium --with-deps

      - name: Levantar app backend en background
        env:
          ENV: production
          TERRENEITOR_SECRET_KEY: e2e-test-secret-key-not-for-prod
          TERRENEITOR_DOMAIN: "none"
          TERRENEITOR_COOKIE_SECURE: "0"
          TERRENEITOR_DB_DIR: /tmp/e2e_db
          BASE_FILES_DIR: /tmp/e2e_files
          TERRENEITOR_LOCKS_DIR: /tmp/e2e_locks
          TERRENEITOR_REPORTES_DIR: /tmp/e2e_reportes
        run: |
          mkdir -p /tmp/e2e_db /tmp/e2e_files /tmp/e2e_locks /tmp/e2e_reportes
          cd $GITHUB_WORKSPACE
          PYTHONPATH=. nohup python -m uvicorn backend.core.cerebro:app \
            --host 127.0.0.1 --port 8005 > /tmp/uvicorn.log 2>&1 &
          echo $! > /tmp/uvicorn.pid

      - name: Esperar a que el backend este listo
        run: |
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8005/health || echo "000")
            if [ "$code" = "200" ]; then
              echo "Backend listo en ${i}s."
              exit 0
            fi
            sleep 1
          done
          echo "::group::Backend NO arranco en 60s. Log:"
          cat /tmp/uvicorn.log || true
          echo "::endgroup::"
          exit 1

      - name: Correr tests E2E
        env:
          E2E_BASE_URL: http://127.0.0.1:8005
          E2E_LOGIN_EMAIL: juan.lopez@telconsulting.cl
          E2E_LOGIN_PASSWORD: "1234"
        working-directory: e2e
        run: pytest -c pytest.ini --tb=short

      - name: Subir artifacts (traces/screenshots si fallaron)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-failure-artifacts
          path: |
            e2e/test-results/
            e2e/playwright-report/
          if-no-files-found: ignore

      - name: Apagar backend
        if: always()
        run: |
          if [ -f /tmp/uvicorn.pid ]; then
            kill $(cat /tmp/uvicorn.pid) 2>/dev/null || true
          fi
