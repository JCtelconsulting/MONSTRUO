name: Deploy a Desarrollo

# Workflow desactivado: actualmente no hay entorno dev levantado en el servidor.
# Cuando exista /srv/terreneitor_dev con su propio docker compose, reactivar
# cambiando workflow_dispatch a push.branches: [dev] y ajustando los pasos.

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 10

    steps:
      - name: Verificar que el entorno dev existe
        run: |
          if [ ! -d /srv/terreneitor_dev ]; then
            echo "ERROR - /srv/terreneitor_dev no existe en el servidor."
            echo "El entorno dev no esta levantado todavia."
            exit 1
          fi

      - name: Sincronizar repo en /srv/terreneitor_dev
        run: |
          cd /srv/terreneitor_dev
          git fetch origin dev
          git reset --hard origin/dev
          git log --oneline -1

      - name: Reiniciar contenedor dev
        run: |
          if docker ps --format "{{.Names}}" | grep -q terreneitor_dev_app; then
            docker restart terreneitor_dev_app
            sleep 5
            docker ps --filter name=terreneitor_dev_app --format "{{.Names}} {{.Status}}"
          else
            echo "WARN - contenedor terreneitor_dev_app no encontrado."
          fi
