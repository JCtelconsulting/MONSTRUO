<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Monstruo Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/css/monstruo.css?v=75" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#070b11">
  <style>
    .dashboard-server-status {
      margin: 0;
      text-align: right;
      white-space: nowrap;
      font-size: 0.86rem;
      color: var(--text-soft);
      align-self: center;
    }

    @media (max-width: 900px) {
      .dashboard-server-status {
        width: 100%;
        text-align: left;
        white-space: normal;
        margin-top: 2px;
      }
    }

    .dashboard-grid {
      display: grid;
      gap: 1.3rem;
    }

    .dashboard-grid--kpi {
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      margin-top: 1rem;
    }

    .dashboard-grid--two {
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      margin-top: 0.8rem;
    }

    .dashboard-card {
      cursor: default;
    }

    .dashboard-card.is-critical {
      border-left: 4px solid #ff4444;
    }

    .dashboard-block {
      margin-top: 2rem;
    }

    .dashboard-block-title {
      margin: 0 0 0.7rem;
      font-size: 1rem;
      letter-spacing: 0.3px;
    }

    .dashboard-empty-ok {
      margin-top: 0.7rem;
      border: 1px solid rgba(68, 255, 136, 0.25);
      border-radius: 12px;
      padding: 12px;
      color: rgba(203, 255, 219, 0.95);
      text-align: center;
      background: rgba(68, 255, 136, 0.1);
      font-size: 0.87rem;
    }

    .dashboard-widget-card {
      align-items: flex-start;
      text-align: left;
      min-height: 220px;
    }

    .dashboard-widget-head {
      display: flex;
      justify-content: space-between;
      width: 100%;
      margin-bottom: 0.85rem;
      gap: 12px;
    }

    .dashboard-widget-head h4 {
      margin: 0;
      font-size: 0.95rem;
      letter-spacing: 0.3px;
    }

    .dashboard-widget-help {
      color: var(--text-soft);
      font-size: 0.8rem;
      line-height: 1.35;
      margin-bottom: 0.65rem;
    }

    .monstruo-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }

    .monstruo-table thead tr {
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      text-align: left;
    }

    .monstruo-table th,
    .monstruo-table td {
      padding: 9px 8px;
      vertical-align: middle;
    }

    .monstruo-table th {
      font-size: 0.76rem;
      color: rgba(226, 233, 240, 0.82);
      letter-spacing: 0.6px;
      text-transform: uppercase;
    }

    .monstruo-table tbody tr {
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .monstruo-table tbody tr:hover td {
      background: rgba(255, 255, 255, 0.03);
    }

    .monstruo-table td:last-child,
    .monstruo-table th:last-child {
      text-align: right;
    }

    .dash-link-row[data-ticket-id] {
      cursor: pointer;
    }

    .dash-link-row[data-ticket-id]:hover td {
      background: rgba(212, 168, 67, 0.08);
    }

    .dash-age-warn {
      color: #ff7f7f;
      font-weight: 700;
    }

    .pill-success {
      color: #7dffb0;
      border-color: rgba(68, 255, 136, 0.45);
      background: rgba(68, 255, 136, 0.15);
    }

    .pill-error {
      color: #ff9999;
      border-color: rgba(255, 68, 68, 0.45);
      background: rgba(255, 68, 68, 0.18);
    }

    .guide-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }

    .guide-card {
      background: rgba(8, 12, 18, 0.86);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .guide-card h4 {
      margin: 0;
      font-size: 0.92rem;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }

    .guide-desc {
      font-size: 0.85rem;
      color: var(--text-soft);
      line-height: 1.4;
    }

    .guide-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 0.84rem;
    }

    .guide-list-item {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      padding: 7px 10px;
      background: rgba(255, 255, 255, 0.02);
    }

    .guide-token {
      font-family: 'Space Grotesk', monospace;
      color: #e6f0f9;
      font-size: 0.8rem;
    }

    .guide-value {
      color: var(--text-soft);
      font-size: 0.8rem;
      text-align: right;
    }

    .guide-code {
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      background: rgba(3, 5, 8, 0.9);
      padding: 10px;
      color: #c8f8d6;
      font-size: 0.79rem;
      white-space: pre-wrap;
      line-height: 1.4;
    }

    @media (max-width: 720px) {
      .dashboard-grid--two {
        grid-template-columns: 1fr;
      }

      .monstruo-table {
        font-size: 0.82rem;
      }
    }
  
    /* Lanzadera de modulos (dashboard en construccion: solo accesos) */
    .launch-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 20px;
      margin-top: 8px;
    }

    .launch-card {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 26px 22px;
      border-radius: 16px;
      background: rgba(16, 16, 16, 0.92);
      border: 1px solid rgba(212, 168, 67, 0.2);
      border-top: 3px solid var(--neon);
      color: var(--text);
      text-decoration: none;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.45);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .launch-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 30px rgba(0, 0, 0, 0.6), 0 0 20px rgba(212, 168, 67, 0.22);
    }

    .launch-card > i {
      font-size: 1.7rem;
      color: var(--neon);
      background: rgba(212, 168, 67, 0.1);
      border: 1px solid rgba(212, 168, 67, 0.35);
      border-radius: 12px;
      width: 52px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .launch-card h3 { letter-spacing: 1px; font-size: 1.02rem; }
    .launch-card p { color: var(--text-soft); font-size: 0.9rem; min-height: 2.4em; }
    .launch-cta { color: var(--neon); font-weight: 700; font-size: 0.88rem; display: inline-flex; gap: 8px; align-items: center; }
    .launch-empty { color: var(--text-soft); }
  </style>
</head>

<body class="sidebar-collapsed" data-current-module="dashboard">
  <header id="app-header">
    <div class="header-top">
      <h1>MONSTRUO</h1>
      <button id="sidebar-toggle" class="btn-icon" title="Colapsar menú">
        <i class="fas fa-bars"></i>
      </button>
    </div>

    <nav id="dynamic-sidebar" class="side-nav"></nav>
    <div class="header-actions">
      <span id="who" class="pill shell-who-pill">Usuario</span>
      <div class="footer-buttons-container">
        <button id="btn-open-change-password" class="btn-account" title="Cambiar Contraseña">
          <i class="fas fa-key"></i> <span>Cuenta</span>
        </button>
        <button id="btnLogout" class="btn-logout" title="Cerrar Sesión">
          <i class="fas fa-sign-out-alt"></i> <span>Salir</span>
        </button>
      </div>
    </div>
  </header>

  <main>
    <div class="main-inner module-shell">
      <div class="section-header module-tabs-header module-shell-header">
        <div class="module-shell-title">
          <h2 class="module-page-title">Dashboard</h2>
          <p class="module-shell-subtitle">Ecosistema Telconsulting — elige un módulo</p>
        </div>
        <div class="module-shell-actions">
        </div>
      </div>

      <section class="section-block module-shell-content" id="section-general">
        <!-- Dashboard = lanzadera de modulos. Cada app tiene sus propios
             reportes; los KPIs centralizados se retiraron mientras el
             ecosistema esta en construccion (decision Juan 2026-06-12). -->
        <div class="launch-grid" id="launch-grid">
          <p class="launch-empty">Cargando módulos...</p>
        </div>
      </section>
      <!-- Guía visual retirada del dashboard: ahora vive en plataforma/docs/design.md
           (+ reglas de marca en plataforma/docs/manual-marca-telconsulting.md) -->
    </div>
  </main>

  <script src="../shared/js/utilidades.js?v=210"></script>
  <script>
    // Lanzadera: tarjetas por modulo segun permisos (misma fuente que la barra)
    (async () => {
      const isProd = window.location.hostname.endsWith('.telconsulting.cl');
      const pfx = window.getEnvPrefix ? window.getEnvPrefix() : '';
      const local = (port, path = '/') => `${window.location.protocol}//${window.location.hostname}:${port}${path}`;
      const MODS = [
        { id: 'tks', label: 'Ticketera', desc: 'Mesa de ayuda y soporte', icon: 'fa-ticket-alt', url: isProd ? `https://ticketera.telconsulting.cl${pfx}/` : local(9005) },
        { id: 'pmo', label: 'Proyectos (PMO)', desc: 'Oficina técnica', icon: 'fa-helmet-safety', url: isProd ? `https://pmo.telconsulting.cl${pfx}/` : local(9009) },
        { id: 'erp', label: 'ERP & Finanzas', desc: 'Facturación y pagos', icon: 'fa-file-invoice-dollar', url: isProd ? `https://erp.telconsulting.cl${pfx}/` : local(9006) },
        { id: 'crm', label: 'CRM', desc: 'Clientes y cuentas', icon: 'fa-id-card', url: isProd ? `https://crm.telconsulting.cl${pfx}/` : local(9008) },
        { id: 'bodega', label: 'Bodega', desc: 'Inventario (WMS)', icon: 'fa-warehouse', url: isProd ? `https://bodega.telconsulting.cl${pfx}/` : local(9007) },
        { id: 'terreneitor', label: 'Terreneitor', desc: 'Informes de terreno con fotos', icon: 'fa-camera', url: isProd ? `https://terreneitor.telconsulting.cl${pfx}/` : local(8005) },
        { id: 'fundacion', label: 'Fundación', desc: 'Acompañando Pasos', icon: 'fa-hands-helping', url: isProd ? `https://login.telconsulting.cl${pfx}/fundacion` : local(9001, '/fundacion') },
        { id: 'gta', label: 'GTA', desc: 'Tareas por áreas', icon: 'fa-list-check', url: isProd ? `https://login.telconsulting.cl${pfx}/gta` : local(9001, '/gta') },
        { id: 'ia', label: 'IA (Ultron)', desc: 'Asistente inteligente', icon: 'fa-robot', url: isProd ? `https://ia.telconsulting.cl${pfx}/` : local(9010) },
        { id: 'zabbix', label: 'Zabbix', desc: 'Monitoreo de red', icon: 'fa-signal', url: isProd ? `https://zabbix.telconsulting.cl${pfx}/` : local(9011) },
        { id: 'config', label: 'Configuración', desc: 'Usuarios y parámetros', icon: 'fa-cog', url: isProd ? `https://config.telconsulting.cl${pfx}/` : local(9001, '/configuracion') },
      ];
      let allowed = [];
      try {
        const ses = await window.fetchApi('/api/sesion');
        if (ses && ses.ok) allowed = ses.allowed_modules || [];
      } catch (e) { /* sin sesion: la pagina ya redirige */ }
      const grid = document.getElementById('launch-grid');
      if (!grid) return;
      const items = MODS.filter(m => allowed.includes('*') || allowed.includes(m.id));
      grid.innerHTML = items.length
        ? items.map(m => `
          <a class="launch-card" href="${m.url}">
            <i class="fas ${m.icon}"></i>
            <h3>${m.label}</h3>
            <p>${m.desc}</p>
            <span class="launch-cta">Entrar <i class="fas fa-arrow-right"></i></span>
          </a>`).join('')
        : '<p class="launch-empty">No tienes módulos asignados. Pide acceso en Configuración.</p>';
    })();
  </script>
  <script src="../shared/js/sidebar.js?v=89"></script>
</body>

</html>
