<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Monstruo Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/css/monstruo.css?v=75" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#070b11">
  <style>
    .dashboard-server-status {
      margin: 0;
      text-align: right;
      white-space: nowrap;
      font-size: 0.86rem;
      color: var(--text-soft);
      align-self: center;
    }

    @media (max-width: 900px) {
      .dashboard-server-status {
        width: 100%;
        text-align: left;
        white-space: normal;
        margin-top: 2px;
      }
    }

    .dashboard-grid {
      display: grid;
      gap: 1.3rem;
    }

    .apps-kpi-grid {
      display: flex;
      flex-direction: column;
      gap: 1.6rem;
      margin-top: 1rem;
    }

    .app-kpi-block {
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
    }

    .app-kpi-header {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-soft);
      padding-bottom: 4px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .app-kpi-header i {
      color: var(--neon, #00f3ff);
      font-size: 0.85rem;
    }

    .dashboard-grid--kpi {
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      margin-top: 0;
    }

    .dashboard-grid--two {
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      margin-top: 0.8rem;
    }

    .dashboard-card {
      cursor: default;
    }

    .dashboard-card.is-critical {
      border-left: 4px solid #ff4444;
    }

    .dashboard-block {
      margin-top: 2rem;
    }

    .dashboard-block-title {
      margin: 0 0 0.7rem;
      font-size: 1rem;
      letter-spacing: 0.3px;
    }

    .dashboard-empty-ok {
      margin-top: 0.7rem;
      border: 1px solid rgba(68, 255, 136, 0.25);
      border-radius: 12px;
      padding: 12px;
      color: rgba(203, 255, 219, 0.95);
      text-align: center;
      background: rgba(68, 255, 136, 0.1);
      font-size: 0.87rem;
    }

    .syscon-summary {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      margin-bottom: 0.9rem;
    }

    .syscon-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04);
    }

    .syscon-badge--ok {
      color: #7dffb0;
      border-color: rgba(68,255,136,0.35);
      background: rgba(68,255,136,0.08);
    }

    .syscon-badge--warn {
      color: #ffd166;
      border-color: rgba(255,209,102,0.35);
      background: rgba(255,209,102,0.08);
    }

    .syscon-badge--error {
      color: #ff9999;
      border-color: rgba(255,68,68,0.35);
      background: rgba(255,68,68,0.1);
    }

    .syscon-log {
      display: flex;
      flex-direction: column;
      gap: 3px;
      font-family: 'Space Grotesk', monospace;
      font-size: 0.83rem;
    }

    .syscon-line {
      display: grid;
      grid-template-columns: 1.2rem 7rem 1fr 4rem;
      gap: 0.6rem;
      align-items: center;
      padding: 6px 10px;
      border-radius: 8px;
      border: 1px solid transparent;
    }

    .syscon-line--ok {
      background: rgba(68,255,136,0.04);
      border-color: rgba(68,255,136,0.1);
    }

    .syscon-line--warn {
      background: rgba(255,209,102,0.06);
      border-color: rgba(255,209,102,0.18);
    }

    .syscon-line--error {
      background: rgba(255,68,68,0.07);
      border-color: rgba(255,68,68,0.2);
    }

    .syscon-icon { text-align: center; }
    .syscon-source {
      font-weight: 600;
      color: var(--text-soft);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .syscon-msg {
      color: rgba(226,233,240,0.9);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .syscon-ts {
      text-align: right;
      color: var(--text-soft);
      font-size: 0.76rem;
      white-space: nowrap;
    }

    @media (max-width: 600px) {
      .syscon-line {
        grid-template-columns: 1.2rem 1fr 3rem;
        grid-template-rows: auto auto;
      }
      .syscon-source { display: none; }
    }

    .monstruo-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }

    .monstruo-table thead tr {
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      text-align: left;
    }

    .monstruo-table th,
    .monstruo-table td {
      padding: 9px 8px;
      vertical-align: middle;
    }

    .monstruo-table th {
      font-size: 0.76rem;
      color: rgba(226, 233, 240, 0.82);
      letter-spacing: 0.6px;
      text-transform: uppercase;
    }

    .monstruo-table tbody tr {
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .monstruo-table tbody tr:hover td {
      background: rgba(255, 255, 255, 0.03);
    }

    .monstruo-table td:last-child,
    .monstruo-table th:last-child {
      text-align: right;
    }

    .dash-link-row[data-ticket-id] {
      cursor: pointer;
    }

    .dash-link-row[data-ticket-id]:hover td {
      background: rgba(0, 243, 255, 0.08);
    }

    .dash-age-warn {
      color: #ff7f7f;
      font-weight: 700;
    }

    .pill-success {
      color: #7dffb0;
      border-color: rgba(68, 255, 136, 0.45);
      background: rgba(68, 255, 136, 0.15);
    }

    .pill-error {
      color: #ff9999;
      border-color: rgba(255, 68, 68, 0.45);
      background: rgba(255, 68, 68, 0.18);
    }

    @media (max-width: 720px) {
      .dashboard-grid--two {
        grid-template-columns: 1fr;
      }

      .monstruo-table {
        font-size: 0.82rem;
      }
    }
  </style>
</head>

<body class="sidebar-collapsed" data-current-module="dashboard">
  <header id="app-header">
    <div class="header-top">
      <h1>MONSTRUO</h1>
      <button id="sidebar-toggle" class="btn-icon" title="Colapsar menú">
        <i class="fas fa-bars"></i>
      </button>
    </div>

    <nav id="dynamic-sidebar" class="side-nav"></nav>
    <div class="header-actions">
      <span id="who" class="pill shell-who-pill">Usuario</span>
      <div class="footer-buttons-container">
        <button id="btn-open-change-password" class="btn-account" title="Cambiar Contraseña">
          <i class="fas fa-key"></i> <span>Cuenta</span>
        </button>
        <button id="btnLogout" class="btn-logout" title="Cerrar Sesión">
          <i class="fas fa-sign-out-alt"></i> <span>Salir</span>
        </button>
      </div>
    </div>
  </header>

  <main>
    <div class="main-inner module-shell">
      <div class="section-header module-tabs-header module-shell-header">
        <div class="module-shell-title">
          <h2 class="module-page-title">Dashboard</h2>
          <p class="module-shell-subtitle">Resumen Operativo Monstruo</p>
        </div>
        <div class="module-shell-actions">
          <p id="dashboard-status" class="dashboard-server-status">Cargando estado del servidor...</p>
        </div>
      </div>

      <section class="section-block module-shell-content" id="section-general">

        <div class="apps-kpi-grid">

          <div class="app-kpi-block">
            <div class="app-kpi-header">
              <i class="fas fa-headset"></i>
              <span>Ticketera</span>
            </div>
            <div class="dashboard-grid dashboard-grid--kpi">
              <div class="card card-terreno dashboard-card" id="kpi-tks-open">
                <i class="fas fa-ticket-alt"></i>
                <h2>—</h2><p>abiertos</p>
              </div>
              <div class="card card-gerencia dashboard-card" id="kpi-tks-closed">
                <i class="fas fa-check-circle"></i>
                <h2>—</h2><p>cerrados</p>
              </div>
              <div class="card card-terreno dashboard-card" id="kpi-tks-critical">
                <i class="fas fa-exclamation-triangle"></i>
                <h2>—</h2><p>críticos</p>
              </div>
            </div>
          </div>

          <div class="app-kpi-block">
            <div class="app-kpi-header">
              <i class="fas fa-sitemap"></i>
              <span>GTA</span>
            </div>
            <div class="dashboard-grid dashboard-grid--kpi">
              <div class="card card-supervisor dashboard-card" id="kpi-gta-pendientes">
                <i class="fas fa-clock"></i>
                <h2>—</h2><p>pendientes</p>
              </div>
              <div class="card card-supervisor dashboard-card" id="kpi-gta-progreso">
                <i class="fas fa-spinner"></i>
                <h2>—</h2><p>en progreso</p>
              </div>
              <div class="card card-terreno dashboard-card" id="kpi-gta-quiebres">
                <i class="fas fa-unlink"></i>
                <h2>—</h2><p>quiebres abiertos</p>
              </div>
            </div>
          </div>

        </div>

        <div class="dashboard-block">
          <h3 class="dashboard-block-title"><i class="fas fa-terminal"></i> Sistema</h3>
          <div id="system-console">
            <div class="dashboard-empty-ok"><i class="fas fa-circle-notch fa-spin"></i> Cargando...</div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script src="../shared/js/utilidades.js?v=210"></script>
  <script src="../shared/js/admin.js?v=5"></script>
  <script>
    const DASHBOARD_REFRESH_MS = 30000;

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function asNumber(value, fallback = 0) {
      const n = Number(value);
      return Number.isFinite(n) ? n : fallback;
    }

    function truncate(text, max = 48) {
      const raw = String(text || '');
      if (raw.length <= max) return raw;
      return raw.slice(0, Math.max(0, max - 1)).trimEnd() + '…';
    }

function initDashboardInteractions() {}

    function renderDashboardHeader(data) {
      const statusNode = document.getElementById('dashboard-status');
      if (!statusNode) return;
      const systemStatus = String(data.system_status || 'unknown').toLowerCase();
      const healthy = systemStatus === 'healthy';
      const statusLabel = healthy ? 'HEALTHY' : systemStatus.toUpperCase();
      const failures24h = asNumber(data.jobs_health && data.jobs_health.failures_24h, 0);
      let html = `Estado: <span class="pill ${healthy ? 'pill-success' : 'pill-error'}">${escapeHtml(statusLabel)}</span>`;
      if (failures24h > 0) {
        html += ` • ${failures24h} fallas de jobs (24h)`;
      }
      statusNode.innerHTML = html;
    }

    function renderTicketeraKpis(kpis) {
      const open = asNumber(kpis.tickets_open, 0);
      const closed = asNumber(kpis.tickets_closed, 0);
      const critical = asNumber(kpis.tickets_critical, 0);

      const el = (id) => document.getElementById(id);

      const cardOpen = el('kpi-tks-open');
      if (cardOpen) {
        cardOpen.classList.toggle('is-critical', open > 0);
        cardOpen.innerHTML = `<i class="fas fa-ticket-alt"></i><h2>${open}</h2><p>abiertos</p>`;
      }
      const cardClosed = el('kpi-tks-closed');
      if (cardClosed) {
        cardClosed.innerHTML = `<i class="fas fa-check-circle"></i><h2>${closed}</h2><p>cerrados</p>`;
      }
      const cardCrit = el('kpi-tks-critical');
      if (cardCrit) {
        cardCrit.classList.toggle('is-critical', critical > 0);
        cardCrit.innerHTML = `<i class="fas fa-exclamation-triangle"></i><h2>${critical}</h2><p>críticos</p>`;
      }
    }

    function renderGtaKpis(stats) {
      const pendientes = asNumber(stats.pendientes, 0);
      const enProgreso = asNumber(stats.en_progreso, 0);
      const quiebres = asNumber(stats.quiebres_abiertos, 0);

      const el = (id) => document.getElementById(id);

      const cardPend = el('kpi-gta-pendientes');
      if (cardPend) {
        cardPend.innerHTML = `<i class="fas fa-clock"></i><h2>${pendientes}</h2><p>pendientes</p>`;
      }
      const cardProg = el('kpi-gta-progreso');
      if (cardProg) {
        cardProg.innerHTML = `<i class="fas fa-spinner"></i><h2>${enProgreso}</h2><p>en progreso</p>`;
      }
      const cardQ = el('kpi-gta-quiebres');
      if (cardQ) {
        cardQ.classList.toggle('is-critical', quiebres > 0);
        cardQ.innerHTML = `<i class="fas fa-unlink"></i><h2>${quiebres}</h2><p>quiebres abiertos</p>`;
      }
    }

    function _tsLabel(iso) {
      if (!iso) return '-';
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return '-';
      const diffMin = Math.floor((Date.now() - d.getTime()) / 60000);
      if (diffMin < 1) return 'ahora';
      if (diffMin < 60) return `hace ${diffMin}m`;
      const diffHrs = Math.floor(diffMin / 60);
      if (diffHrs < 24) return `hace ${diffHrs}h`;
      return `hace ${Math.floor(diffHrs / 24)}d`;
    }

    function renderSystemConsole(data) {
      const container = document.getElementById('system-console');
      if (!container) return;

      const failures = Array.isArray(data.recent_failures) ? data.recent_failures : [];
      const events = Array.isArray(data.system_events) ? data.system_events : [];
      const staleRunning = (data.jobs_health && data.jobs_health.stale_running) || 0;
      const failures24h = (data.jobs_health && data.jobs_health.failures_24h) || 0;

      const logLines = [];
      events.forEach((e) => {
        const s = e.status || 'ok';
        logLines.push({
          icon: s === 'error' ? '🔴' : s === 'warn' ? '🟡' : '🟢',
          label: escapeHtml(e.label || e.source || '-'),
          msg: escapeHtml(truncate(e.msg || '', 95)),
          ts: _tsLabel(e.ts),
          raw_ts: e.ts || '',
          severity: s,
        });
      });
      failures.forEach((f) => {
        logLines.push({
          icon: '🔴',
          label: escapeHtml(f.job_type || 'Job'),
          msg: escapeHtml(truncate(f.error_msg || f.last_error || 'Error desconocido', 95)),
          ts: _tsLabel(f.started_at || f.updated_at),
          raw_ts: f.started_at || f.updated_at || '',
          severity: 'error',
        });
      });
      logLines.sort((a, b) => (b.raw_ts > a.raw_ts ? 1 : -1));

      const summaryHtml = `
        <div class="syscon-summary">
          <span class="syscon-badge ${failures24h > 0 ? 'syscon-badge--error' : 'syscon-badge--ok'}">
            <i class="fas fa-bolt"></i> ${failures24h} fallas 24h
          </span>
          <span class="syscon-badge ${staleRunning > 0 ? 'syscon-badge--warn' : 'syscon-badge--ok'}">
            <i class="fas fa-hourglass-half"></i> ${staleRunning} jobs atascados
          </span>
        </div>`;

      if (!logLines.length) {
        container.innerHTML = summaryHtml + `
          <div class="dashboard-empty-ok"><i class="fas fa-check-circle"></i> Todos los sistemas operativos</div>`;
        return;
      }

      const rows = logLines.map((l) => `
        <div class="syscon-line syscon-line--${l.severity}">
          <span class="syscon-icon">${l.icon}</span>
          <span class="syscon-source">${l.label}</span>
          <span class="syscon-msg">${l.msg}</span>
          <span class="syscon-ts">${l.ts}</span>
        </div>`).join('');

      container.innerHTML = summaryHtml + `<div class="syscon-log">${rows}</div>`;
    }

    async function loadDashboard() {
      try {
        const [opsData, gtaData] = await Promise.allSettled([
          window.fetchApi('/api/ops/dashboard'),
          window.fetchApi('/api/gta/stats'),
        ]);

        const ops = opsData.status === 'fulfilled' ? (opsData.value || {}) : {};
        const gta = gtaData.status === 'fulfilled' ? (gtaData.value || {}) : {};

        renderDashboardHeader(ops);
        renderTicketeraKpis((ops.kpis) || {});
        renderGtaKpis(gta);
        renderSystemConsole(ops);
      } catch (err) {
        console.error('Dashboard Error', err);
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      if (window.initLogout) window.initLogout();
      initDashboardInteractions();
      loadDashboard();
      setInterval(loadDashboard, DASHBOARD_REFRESH_MS);
    });
  </script>
  <script src="../shared/js/sidebar.js?v=88"></script>
</body>

</html>
