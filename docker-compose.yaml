version: '3.8'

services:
  db:
    image: postgres:16
    container_name: ${STACK_NAME:-monstruo-dev}-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-monstruo_dev}
      POSTGRES_USER: ${POSTGRES_USER:-monstruo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD_required}
    volumes:
      - ./plataforma/data/postgres:/var/lib/postgresql/data
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: ./gateway/Dockerfile
    container_name: ${STACK_NAME:-monstruo-dev}-gateway
    env_file:
      - ${ENV_FILE:-plataforma/ops/env/.env.server.dev}
    ports:
      - "${GATEWAY_PORT:-9001}:9001"
    environment:
      - PYTHONPATH=/app:/app/plataforma
      - PORT=9001
      - DB_URL=postgresql://${POSTGRES_USER:-monstruo}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD_required}@db:5432/${POSTGRES_DB:-monstruo_dev}
    depends_on:
      - db
    restart: unless-stopped
    command: ["uvicorn", "gateway.backend.main:app", "--host", "0.0.0.0", "--port", "9001"]

  ticketera:
    build:
      context: .
      dockerfile: ./ticketera/Dockerfile
    container_name: ${STACK_NAME:-monstruo-dev}-ticketera
    env_file:
      - ${ENV_FILE:-plataforma/ops/env/.env.server.dev}
    ports:
      - "9005:9005"
    environment:
      - PYTHONPATH=/app:/app/plataforma
      - PORT=9005
      - DB_URL=postgresql://${POSTGRES_USER:-monstruo}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD_required}@db:5432/${POSTGRES_DB:-monstruo_dev}
    depends_on:
      - db
    restart: unless-stopped
    command: ["uvicorn", "ticketera.backend.main:app", "--host", "0.0.0.0", "--port", "9005"]
