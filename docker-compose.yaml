volumes:
  monstruo_pgdata:


services:
  db:
    image: postgres:16
    container_name: ${STACK_NAME:-monstruo}-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-monstruo}
      POSTGRES_USER: ${POSTGRES_USER:-monstruo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD_required}
    volumes:
      - monstruo_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: code/ops/docker/Dockerfile.api
    container_name: ${STACK_NAME:-monstruo}-api
    env_file:
      - ${ENV_FILE:-ops/env/.env.server.dev}
    volumes:
      - ./code:/app/code
      - ./data/tickets:${TICKET_ATTACHMENTS_DIR:-/srv/monstruo_dev/data/tickets}
      - ./data/compliance:${COMPLIANCE_EXPORT_DIR:-/srv/monstruo_dev/data/compliance}
    ports:
      - "${PORT:-9000}:9000"
    environment:
      - PYTHONPATH=/app/code
      - PORT=${PORT:-9000}
      - DB_URL=postgresql://${POSTGRES_USER:-monstruo}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD_required}@db:5432/${POSTGRES_DB:-monstruo}
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY_required}
      - COOKIE_DOMAIN=${COOKIE_DOMAIN:-}
      - COOKIE_SECURE=${COOKIE_SECURE:-0}
      - LAUDUS_BASE_URL=${LAUDUS_BASE_URL:-https://api.laudus.cl}
      - LAUDUS_USERNAME=${LAUDUS_USERNAME:-}
      - LAUDUS_PASSWORD=${LAUDUS_PASSWORD:-}
      - LAUDUS_COMPANY_VAT_ID=${LAUDUS_COMPANY_VAT_ID:-}
      - APP_GIT_SHA=${APP_GIT_SHA:-unknown}
      - APP_GIT_BRANCH=${APP_GIT_BRANCH:-unknown}
      - APP_BUILD_TIME=${APP_BUILD_TIME:-unknown}
    depends_on:
      - db
    restart: unless-stopped
