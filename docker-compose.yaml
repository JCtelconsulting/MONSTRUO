# Contrato canónico DEV/PROD (plataforma/docs/AGENTS.md §4):
# - DEV: STACK_NAME=monstruo-dev, POSTGRES_DB=monstruo_dev, ENV_FILE=plataforma/ops/env/.env.server.dev
# - PROD: STACK_NAME=monstruo, POSTGRES_DB=monstruo, ENV_FILE=plataforma/ops/env/.env.server
# Reglas no negociables:
# - Postgres NUNCA publica 5432 al host (solo red interna docker).
# - Gateway publica 9001, ticketera publica 9005 en ambos entornos.
# - Adjuntos persisten en ticketera/data/{tickets,compliance} (bind mount directo, sin symlinks).
# - Datos Postgres persisten como bind mount en plataforma/data/postgres (idéntico DEV/PROD).
#
# Tabla de puertos fijos:
#   9001  gateway
#   9005  ticketera
#   9006  fundacion
#   9007  bodega
#   9008  crm
#   9009  erp
#   9012  gta

# Nombre del proyecto fijo: evita que Docker derive el nombre del directorio
# y cree una red diferente a la esperada (monstruo-dev_default vs monstruo_dev_default).
name: ${STACK_NAME:-monstruo-dev}

services:
  db:
    image: postgres:16
    container_name: ${STACK_NAME:-monstruo-dev}-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-monstruo_dev}
      POSTGRES_USER: ${POSTGRES_USER:-monstruo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD_required}
    volumes:
      - ./plataforma/data/postgres:/var/lib/postgresql/data
    # NO exponer 5432 al host: la DB solo es accesible por la red interna docker.
    # Postgres con margen para work_mem, vacuums y conexiones concurrentes.
    mem_limit: 512m
    mem_reservation: 128m
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: ./gateway/Dockerfile
      args:
        APP_UID: ${APP_UID:-1000}
        APP_GID: ${APP_GID:-1000}
    container_name: ${STACK_NAME:-monstruo-dev}-gateway
    env_file:
      - ${ENV_FILE:-plataforma/ops/env/.env.server.dev}
    ports:
      - "${GATEWAY_PORT:-9001}:9001"
    environment:
      - PYTHONPATH=/app:/app/plataforma
      - ASSET_VERSION=${ASSET_VERSION:-}
      - PORT=9001
      - DB_URL=postgresql://${POSTGRES_USER:-monstruo}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD_required}@db:5432/${POSTGRES_DB:-monstruo_dev}
    volumes:
      - ./plataforma/data_runtime/tickets:/app/ticketera/data/tickets
      - ./ticketera/data/compliance:/app/ticketera/data/compliance
    depends_on:
      - db
    mem_limit: 256m
    mem_reservation: 96m
    restart: unless-stopped
    command: [ "uvicorn", "gateway.backend.main:app", "--host", "0.0.0.0", "--port", "9001" ]

  ticketera:
    build:
      context: .
      dockerfile: ./ticketera/Dockerfile
      args:
        APP_UID: ${APP_UID:-1000}
        APP_GID: ${APP_GID:-1000}
    container_name: ${STACK_NAME:-monstruo-dev}-ticketera
    env_file:
      - ${ENV_FILE:-plataforma/ops/env/.env.server.dev}
    ports:
      - "${TICKETERA_PORT:-9005}:9005"
    environment:
      - PYTHONPATH=/app:/app/plataforma
      - ASSET_VERSION=${ASSET_VERSION:-}
      - PORT=9005
      - DB_URL=postgresql://${POSTGRES_USER:-monstruo}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD_required}@db:5432/${POSTGRES_DB:-monstruo_dev}
    volumes:
      - ./plataforma/data_runtime/tickets:/app/ticketera/data/tickets
      - ./ticketera/data/compliance:/app/ticketera/data/compliance
    depends_on:
      - db
    mem_limit: 256m
    mem_reservation: 96m
    restart: unless-stopped
    command: [ "uvicorn", "ticketera.backend.main:app", "--host", "0.0.0.0", "--port", "9005" ]

  # Fundación SEPARADA a su propio stack en /srv/fundacion_dev (Postgres, login e
  # infra propios). Ya no se construye ni se sirve desde el monorepo de Monstruo.

  bodega:
    build:
      context: .
      dockerfile: ./bodega/Dockerfile
      args:
        APP_UID: ${APP_UID:-1000}
        APP_GID: ${APP_GID:-1000}
    container_name: ${STACK_NAME:-monstruo-dev}-bodega
    env_file:
      - ${ENV_FILE:-plataforma/ops/env/.env.server.dev}
    ports:
      - "${BODEGA_PORT:-9007}:9007"
    environment:
      - PYTHONPATH=/app:/app/plataforma
      - ASSET_VERSION=${ASSET_VERSION:-}
      - PORT=9007
      - DB_URL=postgresql://${POSTGRES_USER:-monstruo}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD_required}@db:5432/${POSTGRES_DB:-monstruo_dev}
    depends_on:
      - db
    mem_limit: 256m
    mem_reservation: 96m
    restart: unless-stopped
    command: [ "uvicorn", "bodega.backend.main:app", "--host", "0.0.0.0", "--port", "9007" ]

  crm:
    build:
      context: .
      dockerfile: ./crm/Dockerfile
      args:
        APP_UID: ${APP_UID:-1000}
        APP_GID: ${APP_GID:-1000}
    container_name: ${STACK_NAME:-monstruo-dev}-crm
    env_file:
      - ${ENV_FILE:-plataforma/ops/env/.env.server.dev}
    ports:
      - "${CRM_PORT:-9008}:9008"
    environment:
      - PYTHONPATH=/app:/app/plataforma
      - ASSET_VERSION=${ASSET_VERSION:-}
      - PORT=9008
      - DB_URL=postgresql://${POSTGRES_USER:-monstruo}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD_required}@db:5432/${POSTGRES_DB:-monstruo_dev}
    depends_on:
      - db
    mem_limit: 256m
    mem_reservation: 96m
    restart: unless-stopped
    command: [ "uvicorn", "crm.backend.main:app", "--host", "0.0.0.0", "--port", "9008" ]

  erp:
    build:
      context: .
      dockerfile: ./erp/Dockerfile
      args:
        APP_UID: ${APP_UID:-1000}
        APP_GID: ${APP_GID:-1000}
    container_name: ${STACK_NAME:-monstruo-dev}-erp
    env_file:
      - ${ENV_FILE:-plataforma/ops/env/.env.server.dev}
    ports:
      - "${ERP_PORT:-9009}:9009"
    environment:
      - PYTHONPATH=/app:/app/plataforma
      - ASSET_VERSION=${ASSET_VERSION:-}
      - PORT=9009
      - DB_URL=postgresql://${POSTGRES_USER:-monstruo}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD_required}@db:5432/${POSTGRES_DB:-monstruo_dev}
    depends_on:
      - db
    mem_limit: 256m
    mem_reservation: 96m
    restart: unless-stopped
    command: [ "uvicorn", "erp.backend.main:app", "--host", "0.0.0.0", "--port", "9009" ]

  gta:
    build:
      context: .
      dockerfile: ./gta/Dockerfile
      args:
        APP_UID: ${APP_UID:-1000}
        APP_GID: ${APP_GID:-1000}
    container_name: ${STACK_NAME:-monstruo-dev}-gta
    env_file:
      - ${ENV_FILE:-plataforma/ops/env/.env.server.dev}
    ports:
      - "${GTA_PORT:-9012}:9012"
    environment:
      - PYTHONPATH=/app:/app/plataforma
      - ASSET_VERSION=${ASSET_VERSION:-}
      - PORT=9012
      - DB_URL=postgresql://${POSTGRES_USER:-monstruo}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD_required}@db:5432/${POSTGRES_DB:-monstruo_dev}
    depends_on:
      - db
    mem_limit: 256m
    mem_reservation: 96m
    restart: unless-stopped
    command: [ "uvicorn", "gta.backend.main:app", "--host", "0.0.0.0", "--port", "9012" ]

  # Terreneitor: informes de terreno con evidencia fotografica. Modulo estandar
  # (backend/ui/data) pero conserva env_file dedicado (TERRENEITOR_* + Postgres
  # central schema terreneitor + SSO del gateway) y volumenes data/+logs/
  # (persistencia de fotos/db/reportes). Puerto 8005: el proxy ya rutea ahi.
  terreneitor:
    build:
      context: .
      dockerfile: ./terreneitor/Dockerfile
      args:
        APP_UID: ${APP_UID:-1000}
        APP_GID: ${APP_GID:-1000}
    container_name: ${STACK_NAME:-monstruo-dev}-terreneitor
    env_file:
      - ./terreneitor/environments/.env
    ports:
      - "${TERRENEITOR_PORT:-8005}:8005"
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
      - ASSET_VERSION=${ASSET_VERSION:-}
      # ENV lo controla el env_file (dev=.env dev / prod=.env production). No hardcodear aquí.
    volumes:
      - ./terreneitor/data:/app/data
      - ./terreneitor/logs:/app/logs
    depends_on:
      - db
    mem_limit: 512m
    mem_reservation: 128m
    restart: unless-stopped
    command: [ "uvicorn", "terreneitor.backend.main:app", "--host", "0.0.0.0", "--port", "8005" ]
