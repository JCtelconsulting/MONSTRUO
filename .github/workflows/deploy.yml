name: CI + Deploy

on:
  pull_request:
  push:
    branches: ["main", "dev"]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r code/requirements.txt
      - name: Compile (syntax check)
        run: |
          python -m compileall -q code/app

  deploy:
    needs: tests
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
    runs-on: self-hosted
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'development' }}
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Resolve deploy target
        id: target
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "branch=main" >> "$GITHUB_OUTPUT"
            echo "env_file=/srv/monstruo/.env.server" >> "$GITHUB_OUTPUT"
            echo "project=monstruo" >> "$GITHUB_OUTPUT"
            echo "stack=monstruo" >> "$GITHUB_OUTPUT"
            echo "health=http://127.0.0.1:9000/health" >> "$GITHUB_OUTPUT"
            echo "deploy_path=/srv/monstruo" >> "$GITHUB_OUTPUT"
          else
            echo "branch=dev" >> "$GITHUB_OUTPUT"
            echo "env_file=/srv/monstruo_dev/.env.server.dev" >> "$GITHUB_OUTPUT"
            # Mantener project estable evita conflictos de labels/ownership en contenedores existentes.
            echo "project=monstruo_dev" >> "$GITHUB_OUTPUT"
            echo "stack=monstruo-dev" >> "$GITHUB_OUTPUT"
            echo "health=http://127.0.0.1:9001/health" >> "$GITHUB_OUTPUT"
            echo "deploy_path=/srv/monstruo_dev" >> "$GITHUB_OUTPUT"
          fi
      - name: Deploy to server
        env:
          DEPLOY_PATH: ${{ steps.target.outputs.deploy_path }}
          DEPLOY_BRANCH: ${{ steps.target.outputs.branch }}
          DEPLOY_ENV_FILE: ${{ steps.target.outputs.env_file }}
          DEPLOY_COMPOSE_PROJECT: ${{ steps.target.outputs.project }}
          DEPLOY_STACK_NAME: ${{ steps.target.outputs.stack }}
          HEALTH_URL: ${{ steps.target.outputs.health }}
        run: |
          set -euo pipefail
          # Asegurar permisos de ejecución en el script del workspace
          chmod +x ops/herramientas/deploy/deploy.sh
          # Ejecutar el script DESDE EL WORKSPACE, apuntando al directorio destino
          bash ops/herramientas/deploy/deploy.sh
