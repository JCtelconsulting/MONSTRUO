name: CI + Deploy

on:
  pull_request:
  push:
    branches: ["main", "dev"]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Setup pip
        run: |
          python -m pip install --upgrade pip
      - name: Compile (syntax check)
        run: |
          python -m compileall -q plataforma/core plataforma/tests plataforma/ops/herramientas bodega crm erp fundacion gateway ticketera
      - name: Deploy script syntax
        run: |
          bash -n plataforma/ops/herramientas/deploy/deploy.sh
      - name: Repo guard
        run: |
          python plataforma/tests/ci_repo_guard.py

  deploy:
    needs: tests
    if: github.ref == 'refs/heads/main'
    runs-on: self-hosted
    environment: production
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Resolve deploy target
        id: target
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "branch=main" >> "$GITHUB_OUTPUT"
            echo "env_file=/srv/monstruo/plataforma/ops/env/.env.server" >> "$GITHUB_OUTPUT"
            echo "project=monstruo" >> "$GITHUB_OUTPUT"
            echo "stack=monstruo" >> "$GITHUB_OUTPUT"
            echo "health=http://127.0.0.1:9000/health" >> "$GITHUB_OUTPUT"
            echo "deploy_path=/srv/monstruo" >> "$GITHUB_OUTPUT"
          else
            echo "Solo se permite el despliegue automático en la rama main hacia la VM de producción."
            exit 1
          fi
      - name: Deploy to server
        env:
          DEPLOY_PATH: ${{ steps.target.outputs.deploy_path }}
          DEPLOY_BRANCH: ${{ steps.target.outputs.branch }}
          DEPLOY_ENV_FILE: ${{ steps.target.outputs.env_file }}
          DEPLOY_COMPOSE_PROJECT: ${{ steps.target.outputs.project }}
          DEPLOY_STACK_NAME: ${{ steps.target.outputs.stack }}
          HEALTH_URL: ${{ steps.target.outputs.health }}
        run: |
          set -euo pipefail
          # Asegurar permisos de ejecución en el script del workspace
          chmod +x plataforma/ops/herramientas/deploy/deploy.sh
          # Ejecutar el script DESDE EL WORKSPACE, apuntando al directorio destino
          bash plataforma/ops/herramientas/deploy/deploy.sh
