name: Deploy (Server)

on:
  push:
    branches: ["main"]

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 20
    steps:
      - name: Deploy (local)
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_BRANCH: main
        run: |
          APP_DIR="${DEPLOY_PATH:-/srv/monstruo}"
          cd "$APP_DIR"
          bash ops/herramientas/deploy/deploy.sh
