name: CI + Deploy

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r code/requirements.txt
      - name: Compile (syntax check)
        run: |
          python -m compileall -q code/app

  deploy:
    needs: tests
    if: github.ref == 'refs/heads/main'
    runs-on: self-hosted
    environment: production
    timeout-minutes: 20
    steps:
      - name: Deploy to server
        env:
          DEPLOY_PATH: /srv/monstruo
          DEPLOY_BRANCH: main
        run: |
          set -euo pipefail
          bash /srv/monstruo/ops/herramientas/deploy/deploy.sh
