name: Deploy Monstruo (Self-Hosted)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Actualizar /srv/monstruo y Reiniciar
        run: |
          echo "🚀 Iniciando actualización en producción..."
          
          # 1. Ir a la carpeta REAL de producción
          TARGET="/srv/monstruo"
          if [ ! -d "$TARGET" ]; then
            echo "❌ Error: $TARGET no existe."
            exit 1
          fi
          cd "$TARGET"
          
          # 2. Configurar Git seguro (por si cambia el usuario del runner)
          git config --global --add safe.directory "$TARGET"
          
          # 3. Descargar cambios (Forzando estado remoto)
          echo "↓ Descargando código..."
          # git fetch origin main
          # git reset --hard origin/main
          # Usamos pull simple si confiamos en la historia, reset es más agresivo pero seguro para deploy
          git pull origin main
          
          # 4. Reiniciar Docker
          echo "🔄 Reiniciando contenedores..."
          # Prevenir conflicto de puertos bajando primero
          docker compose down --remove-orphans
          docker compose up -d --build
          
          # 5. Limpieza
          docker system prune -f
          
          echo "✅ Despliegue completado."
