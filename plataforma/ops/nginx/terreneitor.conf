# TERRRENEITOR UNIFICADO
# PROD: 192.168.60.5:8080
# DEV: 192.168.60.5:8081

# portal.telconsulting.cl
server {
    listen 80;
    server_name portal.telconsulting.cl;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name portal.telconsulting.cl;

    ssl_certificate     /etc/letsencrypt/live/portal.telconsulting.cl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/portal.telconsulting.cl/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    client_max_body_size 1024M;
    client_body_timeout 300s;

    location = /prod { return 301 /; }
    location ^~ /prod/ { return 301 /; }
    location = /dev { return 301 /dev/; }

    location = / {
        add_header X-Terreneitor-Env "prod" always;
        proxy_set_header Accept-Encoding "";
        sub_filter_once on;
        sub_filter "<head>" "<head><base href='/modulos/portal/'>";
        proxy_pass http://192.168.60.5:8080;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location = /dev/ {
        add_header X-Terreneitor-Env "dev" always;
        rewrite ^/dev/(.*)$ /$1 break;
        proxy_redirect ~^(/.*)$ /dev$1;
        proxy_set_header Accept-Encoding "";
        sub_filter_once on;
        sub_filter "<head>" "<head><base href='/dev/modulos/portal/'>";
        proxy_pass http://192.168.60.5:8081;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /dev;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location = /__env/dev { return 302 /dev/; }
    location = /__env/prod { return 302 /; }

    location ^~ /dev/ {
        add_header X-Terreneitor-Env "dev" always;
        rewrite ^/dev/(.*)$ /$1 break;
        proxy_redirect ~^(/.*)$ /dev$1;
        proxy_pass http://192.168.60.5:8081;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /dev;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location ^~ /auth/ {
        rewrite ^/auth/(.*)$ /api/auth/$1 break;
        proxy_pass http://192.168.60.5:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        add_header X-Terreneitor-Env "prod" always;
        proxy_pass http://192.168.60.5:8080;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

