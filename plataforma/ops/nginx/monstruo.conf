# PROPUESTA UNIFICADA V4 - MONSTRUO POR DOMINIOS
# NO HABILITAR SIN REVISION
# Estructura:
# 1. MAPA PROD
# 2. MAPA DEV
# 3. DOMINIOS
# Regla: cada dominio es una app distinta y no reutiliza upstream de otra app.
# Nota: para mantener validez tecnica de Nginx, PROD y DEV se separan por mapas
# arriba, pero cada server_name sigue en un solo bloque de dominio.
# Nota 2: PROD hoy solo tiene activos ticketera, login y config sobre el monolito.
# Nota 3: el resto de PROD queda pre-ensamblado para migracion futura.
# Nota 4: DEV se organiza por servicios reales.

# ===== MAPA PROD =====
# monolito-prod: hoy solo sostiene ticketera, login y config
upstream monstruo_prod_ticketera_app {
    server 192.168.60.5:9001;
    keepalive 16;
}

upstream monstruo_prod_login_app {
    server 192.168.60.5:9001;
    keepalive 16;
}

upstream monstruo_prod_config_app {
    server 192.168.60.5:9001;
    keepalive 16;
}

upstream monstruo_prod_ticketera_api {
    server 192.168.60.5:9005;
    keepalive 16;
}

upstream monstruo_prod_fundacion_api {
    server 192.168.60.5:9006;
    keepalive 16;
}

# ===== MAPA DEV =====
# base-dev: shell comun y API base que hoy consumen ticketera, login y config
upstream monstruo_dev_base_app {
    server 192.168.60.8:9001;
    keepalive 16;
}

# ticketera-api-dev: API especifica de tickets
upstream monstruo_dev_ticketera_api {
    server 192.168.60.8:9005;
    keepalive 16;
}

upstream monstruo_dev_fundacion_api {
    server 192.168.60.8:9006;
    keepalive 16;
}

# ===== DOMINIOS =====

# ticketera.telconsulting.cl
server {
    listen 80;
    server_name ticketera.telconsulting.cl;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ticketera.telconsulting.cl;

    ssl_certificate /etc/letsencrypt/live/login.telconsulting.cl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/login.telconsulting.cl/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    client_max_body_size 1024M;

    # PROD
    location /prod/ { return 301 /; }
    location = /prod { return 302 /; }
    location /api/tks/ {
        proxy_pass http://monstruo_prod_ticketera_api/api/tks/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Prefix "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/ {
        proxy_pass http://monstruo_prod_ticketera_app/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Prefix "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location / {
        proxy_pass http://monstruo_prod_ticketera_app/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Prefix "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # DEV
    location = /dev { return 302 /dev/; }
    location /dev/api/tks/ {
        proxy_pass http://monstruo_dev_ticketera_api/api/tks/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Prefix /dev;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /dev/api/fundacion/ {
        proxy_pass http://monstruo_dev_fundacion_api/api/fundacion/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Prefix /dev;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /dev/api/ {
        proxy_pass http://monstruo_dev_base_app/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Prefix /dev;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /dev/ {
        proxy_pass http://monstruo_dev_base_app/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Prefix /dev;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

