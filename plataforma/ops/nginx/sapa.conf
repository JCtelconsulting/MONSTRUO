# Este bloque redirige todo el tráfico HTTP a HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name sapa.telconsulting.cl;
    return 301 https://$host$request_uri;
}

# Este es el bloque principal para el tráfico seguro
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sapa.telconsulting.cl;

    # --- Certificado SSL real de Let's Encrypt ---
    ssl_certificate /etc/letsencrypt/live/sapa.telconsulting.cl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sapa.telconsulting.cl/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # --- Configuración para Home Assistant ---
    location / {
        proxy_pass http://192.168.60.4:8123;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
