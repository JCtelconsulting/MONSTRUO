server {
    listen 80;
    server_name ultron.telconsulting.cl;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ultron.telconsulting.cl;

    ssl_certificate /etc/letsencrypt/live/ultron.telconsulting.cl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ultron.telconsulting.cl/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    client_max_body_size 50M;

    location / {
        proxy_pass http://192.168.20.228:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_buffering off;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }
}
