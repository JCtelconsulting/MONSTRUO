    get:
      summary: Obtiene los adjuntos de un cliente
      tags:
      - Clientes
      security:
      - api_key: []
      description: |
        Retorna todos los documentos/archivos adjuntos a un cliente específico.

        Cada adjunto incluye metadatos del archivo y una URL de descarga temporal (válida por 10 minutos).
      responses:
        '200':
          description: adjuntos encontrados
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      nullable: false
                      description: ID del adjunto
                    attachmentable_type:
                      type: string
                      nullable: false
                      description: Tipo de entidad (siempre "Client")
                    attachmentable_id:
                      type: integer
                      nullable: false
                      description: ID del cliente
                    file_name:
                      type: string
                      nullable: false
                      description: Nombre original del archivo
                    file_size:
                      type: integer
                      nullable: false
                      description: Tamaño del archivo en bytes
                    file_content_type:
                      type: string
                      nullable: false
                      description: Tipo MIME
                    file_updated_at:
                      type: string
                      format: date-time
                      nullable: true
                      description: Marca de tiempo de última actualización
                    download_url:
                      type: string
                      nullable: false
                      description: URL de descarga temporal (válida 10 minutos)
                    created_at:
                      type: string
                      format: date-time
                      nullable: false
                      description: Fecha de creación
                    updated_at:
                      type: string
                      format: date-time
                      nullable: false
                      description: Fecha de actualización
        '404':
          description: cliente no encontrado
        '401':
          description: no autorizado
    post:
      summary: Sube un documento a un cliente
      tags:
      - Clientes
      security:
      - api_key: []
      description: |
        Sube un archivo/documento y lo adjunta a un cliente.

        **Nota:** Las cargas de archivos deben probarse usando clientes HTTP (curl, Postman).

        **Requisitos de carga:**
        - Tamaño máximo de archivo: 20 MB
        - Content-Type debe ser `multipart/form-data`

        **Respuesta:**
        Retorna el adjunto creado con metadatos del archivo y URL de descarga.
      parameters: []
      responses:
        '201':
          description: adjunto creado
        '422':
          description: solicitud inválida
        '404':
          description: cliente no encontrado
        '401':
          description: no autorizado
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: file
        required: true
        description: Archivo a subir (máx 20MB)
