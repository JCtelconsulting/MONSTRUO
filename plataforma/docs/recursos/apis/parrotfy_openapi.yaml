---
openapi: 3.0.1
info:
  title: API V1
  version: v1
paths:
  "/api/v1/banks/{bank_id}/bank_transactions":
    get:
      summary: Obtiene una lista de transacciones bancarias
      tags:
      - Transacciones Bancarias
      security:
      - api_key: []
      parameters:
      - name: bank_id
        in: path
        required: true
        schema:
          type: integer
      - name: limit
        in: query
        required: false
        description: Número de registros a retornar
        schema:
          type: integer
      - name: date_from
        in: query
        required: false
        description: Fecha de inicio para filtrar (YYYY-MM-DD)
        schema:
          type: string
      - name: date_to
        in: query
        required: false
        description: Fecha de fin para filtrar (YYYY-MM-DD)
        schema:
          type: string
      - name: validated_status
        in: query
        required: false
        enum:
        - 'true'
        - 'false'
        description: "Filtrar por estado de revisión (true/false):\n * `true` \n *
          `false`\n "
        schema:
          type: string
      responses:
        '200':
          description: transacciones bancarias encontradas
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    bank_id:
                      type: integer
                    bank_document_type_id:
                      type: integer
                      nullable: true
                    archived:
                      type: boolean
                    credit:
                      type: number
                    charge:
                      type: number
                    balance:
                      type: number
                      nullable: true
                    sale_invoice_payment_id:
                      type: integer
                      nullable: true
                    service_invoice_payment_id:
                      type: integer
                      nullable: true
                    document_number:
                      type: string
                      nullable: true
                    bank_receipt:
                      type: string
                      nullable: true
                    transaction_type:
                      type: integer
                    created_at:
                      type: string
                      format: date-time
                    updated_at:
                      type: string
                      format: date-time
                    salary_invoice_payment_id:
                      type: integer
                      nullable: true
                    sale_payment_group_id:
                      type: integer
                      nullable: true
                    payment_group_id:
                      type: integer
                      nullable: true
                    is_advance_payment:
                      type: boolean
                    payment_status:
                      type: integer
                    description:
                      type: string
                      nullable: true
                    project_id:
                      type: integer
                      nullable: true
                    user_id:
                      type: integer
                      nullable: true
                    seller_id:
                      type: integer
                      nullable: true
                    revised:
                      type: boolean
                    transferable:
                      type: boolean
                    balance_revised:
                      type: number
                      nullable: true
                    accounting_revised:
                      type: boolean
                    balance_not_revised:
                      type: number
                      nullable: true
                    date:
                      type: string
                      format: date
                      nullable: true
                    document_date:
                      type: string
                      format: date
                      nullable: true
                    reconciliation_bank_transaction_id:
                      type: integer
                      nullable: true
                    sale_invoice_id:
                      type: integer
                      nullable: true
                    service_invoice_id:
                      type: integer
                      nullable: true
                    salary_entry_id:
                      type: integer
                      nullable: true
                    charge_net_amount:
                      type: number
                    credit_net_amount:
                      type: number
                    movement_type:
                      type: integer
                    entity_id:
                      type: integer
                      nullable: true
                    entity_type:
                      type: string
                      nullable: true
                    accounting_seat_id:
                      type: integer
                      nullable: true
                    sale_package_id:
                      type: integer
                      nullable: true
                    created_manually:
                      type: boolean
                    movement_classification:
                      type: integer
                      nullable: true
                    has_sec_currency:
                      type: boolean
                    currency_conversion:
                      type: number
                      nullable: true
                    sec_currency_credit:
                      type: number
                      nullable: true
                    sec_currency_charge:
                      type: number
                      nullable: true
                    sec_currency_balance:
                      type: number
                    sec_currency_balance_revised:
                      type: number
                    sec_currency_balance_not_revised:
                      type: number
                    credit_quantity:
                      type: number
                      nullable: true
                    quantity_balance:
                      type: number
                      nullable: true
                    charge_quantity:
                      type: number
                      nullable: true
                    project_sale_invoice_id:
                      type: integer
                      nullable: true
                    invoice_note_project_id:
                      type: integer
                      nullable: true
                    fintoc_bank_transaction_id:
                      type: integer
                      nullable: true
                    is_conflict:
                      type: boolean
                    service_invoice_detail_id:
                      type: integer
                      nullable: true
                    business_center_id:
                      type: integer
                      nullable: true
                    inventory_movement_id:
                      type: integer
                      nullable: true
                    created_by_id:
                      type: integer
                      nullable: true
                    used_as_advance:
                      type: boolean
        '401':
          description: no autorizado
