  "/api/v1/shipping_invoices":
    get:
      summary: Obtiene una lista de guías de despacho
      tags:
      - Guías de Despacho
      security:
      - api_key: []
      parameters:
      - name: date_from
        in: query
        required: false
        description: Fecha de inicio (opcional)
        schema:
          type: string
      - name: date_to
        in: query
        required: false
        description: Fecha de fin (opcional)
        schema:
          type: string
      - name: limit
        in: query
        required: false
        description: Número máximo de registros a retornar (por defecto 20)
        schema:
          type: integer
      - name: search
        in: query
        required: false
        description: Filtrar por número de guía o nombre de cliente
        schema:
          type: string
      responses:
        '200':
          description: guías de despacho encontradas
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      nullable: false
                      description: Identificador único
                    invoice_number:
                      type: string
                      nullable: false
                      description: Número de documento
                    date:
                      type: string
                      format: date
                      nullable: false
                      description: Fecha de la guía
                    client_id:
                      type: integer
                      nullable: false
                      description: Identificador del cliente
                    client:
                      type: object
                      properties:
                        id:
                          type: integer
                        name:
                          type: string
                    sale_packages:
                      type: array
                      items:
                        type: object
                        properties:
                          id:
                            type: integer
                          waybill:
                            type: string
                            nullable: true
                          project_id:
                            type: integer
                            nullable: true
        '401':
          description: no autorizado
    post:
      summary: Crea una nueva guía de despacho
      tags:
      - Guías de Despacho
      security:
      - api_key: []
      description: |+
        Crea una nueva guía de despacho en el sistema.

        **Campos Requeridos:**
        - `date` *: Fecha de la guía
        - `client_id` *: ID del cliente (puede encontrarse en el endpoint de clientes)

        **Paquetes o Detalles (al menos uno requerido):**
        Debes proporcionar:
        - `sale_packages_attributes` *: Objeto con IDs de paquetes de venta existentes (ej., `{"0": {"id": 1}}`), O
        - `shipping_invoice_details_attributes` *: Array de detalles de guía de despacho (mínimo 1 ítem requerido)

        **Detalles de Guía de Despacho (shipping_invoice_details_attributes) - Campos Requeridos:**
        Cada ítem de detalle debe incluir:
        - `name` *: Nombre de producto/servicio
        - `code` *: Código de producto/servicio
        - `total_units` *: Cantidad
        - `amount`: Monto total (opcional)
        - `product_id`: ID del producto (opcional)

        **Nota:** Si se proporcionan tanto `sale_packages_attributes` como `shipping_invoice_details_attributes`,
        el sistema usará `sale_packages_attributes`. Si solo se proporciona `shipping_invoice_details_attributes`
        (y `sale_packages_attributes` está vacío u omitido), la guía se creará como guía de grupo.

      parameters: []
      responses:
        '201':
          description: guía de despacho creada
        '422':
          description: solicitud inválida
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                invoice_number:
                  type: string
                  description: Número de guía (opcional - auto-genera si se omite)
                date:
                  type: string
                  format: date
                  description: "* Fecha de la guía"
                client_id:
                  type: integer
                  description: "* ID del cliente"
                sale_packages_attributes:
                  type: object
                  description: '* Atributos para paquetes de venta (ej. {"0": {"id":
                    1}}). Requerido si shipping_invoice_details_attributes no se proporciona.'
                shipping_invoice_details_attributes:
                  type: array
                  description: "* Array de detalles de guía de despacho (mínimo 1
                    requerido). Requerido si sale_packages_attributes no se proporciona."
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                        description: "* Nombre de producto/servicio"
                      code:
                        type: string
                        description: "* Código de producto/servicio"
                      total_units:
                        type: integer
                        description: "* Cantidad"
                      amount:
                        type: integer
                        description: Monto total
                      product_id:
                        type: integer
                        description: ID del producto
                    required:
                    - name
                    - code
                    - total_units
              required:
              - date
              - client_id
