  "/api/v1/payment_conditions":
    get:
      summary: Obtiene una lista de condiciones de pago
      tags:
      - Condiciones de Pago
      security:
      - api_key: []
      description: |
        Retorna todas las condiciones de pago en el sistema (incluyendo las inactivas).

        Las condiciones de pago definen los términos de pago para facturas y cotizaciones, incluyendo:
        - Número de cuotas
        - Calendario de pagos (porcentaje y días para cada cuota)
        - Tasas de interés
        - Asociaciones bancarias para pagos automáticos (opcional)

        Cada condición de pago tiene `payment_condition_details` anidados que definen el calendario de cuotas.
        La suma de todos los porcentajes en los detalles debe ser igual al 100%.
      responses:
        '200':
          description: condiciones de pago encontradas
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      nullable: false
                      description: ID de la condición de pago
                    name:
                      type: string
                      nullable: false
                      description: Nombre de la condición de pago (ej. "30/60/90 días")
                    interest_rate:
                      type: number
                      nullable: false
                      description: Porcentaje de tasa de interés
                    code:
                      type: string
                      nullable: true
                      description: Código de la condición de pago
                    bank_id:
                      type: integer
                      nullable: true
                      description: ID del banco asociado para pagos automáticos
                    active:
                      type: boolean
                      nullable: false
                      description: Indica si la condición de pago está activa
                    editable:
                      type: boolean
                      nullable: false
                      description: Indica si la condición de pago puede ser editada
                    payment_type:
                      type: integer
                      nullable: false
                      description: 'Tipo de pago (0: genérico, 1: suscripción)'
                    created_at:
                      type: string
                      format: date-time
                      nullable: false
                      description: Fecha de creación
                    updated_at:
                      type: string
                      format: date-time
                      nullable: false
                      description: Fecha de actualización
                    payment_condition_details:
                      type: array
                      description: Calendario de cuotas (los porcentajes deben sumar
                        100%)
                      items:
                        type: object
                        properties:
                          id:
                            type: integer
                            nullable: false
                            description: ID del detalle
                          payment_condition_id:
                            type: integer
                            nullable: false
                            description: ID de la condición de pago padre
                          percentage:
                            type: integer
                            nullable: false
                            description: Porcentaje del monto total para esta cuota
                          days:
                            type: integer
                            nullable: false
                            description: Días desde la fecha de factura para esta
                              cuota
                          created_at:
                            type: string
                            format: date-time
                            nullable: false
                            description: Fecha de creación
                          updated_at:
                            type: string
                            format: date-time
                            nullable: false
                            description: Fecha de actualización
        '401':
          description: no autorizado
