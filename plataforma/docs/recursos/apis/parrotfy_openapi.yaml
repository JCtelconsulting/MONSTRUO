    post:
      summary: Crea una nueva factura de venta (soporta FT, NC, ND, BL)
      tags:
      - Facturas de Venta
      security:
      - api_key: []
      description: |+
        Crea un nuevo documento tributario electrónico (DTE) en el sistema, incluyendo facturas, notas de crédito, boletas y notas de débito.

        **Tipos de Documento (`sale_invoice_type`):**
        - `2`: FT - Factura
        - `3`: NC - Nota de Crédito
        - `5`: BL - Boleta
        - `7`: FT - Factura Exenta
        - `12`: ND - Nota de Débito

        **Para Facturas Regulares (FT, Boleta, Exenta) - Campos Requeridos:**
        - `sale_invoice_type` *: Tipo de documento (2=FT, 5=Boleta, 7=Exenta, etc.)
        - `client_id` *: ID del cliente
        - `sale_invoice_details_attributes` *: Lista de ítems (mínimo 1 requerido)
        - `invoice_number`: Opcional - si se omite, auto-genera desde folio

        **Para Notas de Crédito (NC) - Campos Requeridos:**
        - `sale_invoice_type` *: Debe ser 3 (Nota de Crédito)
        - `credit_note_number` *: Número de factura del documento original (ej., "123")
        - `related_invoice_type` *: Tipo de la factura original (ej., 2 para FT)
        - `credit_note_code` *: Tipo (1=Anulación total, 2=Corrección, 3=Devolución parcial)
        - `credit_note_description` *: Razón de la nota de crédito
        - `sale_invoice_details_attributes` *: Lista de ítems (mínimo 1 requerido)
        - `client_id`: Opcional si se incluye la factura referenciada
        - `invoice_id`: Opcional si se incluye la factura referenciada

        **Ítems (sale_invoice_details_attributes) - Campos Requeridos:**
        Cada ítem debe incluir:
        - `code` *: Código de producto/servicio
        - `name` *: Descripción de producto/servicio
        - `total_units` *: Cantidad
        - `unitary_price`: Precio unitario
        - `real_amount` *: Monto total neto
        - `real_gross_amount` *: Monto total bruto
        - `invoice_notes`: Notas (opcional)

        **Numeración de Facturas:**
        - Dejar `invoice_number` en blanco para auto-generar desde folio del sistema
        - Proporcionar `invoice_number` para usar un número personalizado/manual

      parameters: []
      responses:
        '200':
          description: factura de venta creada
        '422':
          description: solicitud inválida
        '401':
          description: no autorizado
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                sale_invoice_type:
                  type: integer
                  description: "* Tipo de documento: 2=FT (Factura), 3=NC (Nota de
                    Crédito), 5=Boleta, 7=Exenta, 12=Nota de Débito"
                client_id:
                  type: integer
                  description: "* ID del cliente (requerido para FT/Boletas, auto-poblado
                    para NC)"
                invoice_number:
                  type: string
                  description: Número de factura personalizado (opcional - auto-genera
                    desde folio si se omite)
                credit_note_number:
                  type: string
                  description: '* Número de factura del documento original (requerido
                    para NC/ND, ej., "123")'
                credit_note_code:
                  type: integer
                  description: "* Tipo de nota de crédito: 1=Anulación total, 2=Corrección,
                    3=Devolución parcial (requerido para NC)"
                related_invoice_type:
                  type: integer
                  description: "* Tipo de la factura original (requerido para NC/ND,
                    ej., 2 para FT)"
                invoice_date:
                  type: string
                  format: date
                  description: Fecha de factura (opcional, por defecto hoy)
                date:
                  type: string
                  format: date
                  description: Fecha de vencimiento (opcional, por defecto hoy)
                invoice_id:
                  type: integer
                  description: ID de base de datos de factura de referencia (opcional
                    - auto-poblado por credit_note_number + related_invoice_type)
                credit_note_description:
                  type: string
                  description: "* Razón de la nota de crédito (requerido para NC)"
                notes:
                  type: string
                  description: Notas adicionales
                sale_invoice_details_attributes:
                  type: array
                  description: "* Líneas (mínimo 1 requerido)"
                  items:
                    type: object
                    properties:
                      code:
                        type: string
                        description: "* Código de producto/servicio"
                      name:
                        type: string
                        description: "* Nombre de producto/servicio"
                      total_units:
                        type: number
                        description: "* Cantidad"
                      unitary_price:
                        type: number
                        description: Precio unitario (opcional - para visualización/referencia)
                      real_amount:
                        type: number
                        description: "* Monto neto (sin impuesto)"
                      real_gross_amount:
                        type: number
                        description: "* Monto bruto (con impuesto)"
                      invoice_notes:
                        type: string
                        description: Notas de línea
                    required:
                    - code
                    - name
                    - total_units
                    - real_amount
                    - real_gross_amount
              required:
              - sale_invoice_type
              - client_id
              - sale_invoice_details_attributes
