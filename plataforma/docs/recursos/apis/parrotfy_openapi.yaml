  "/api/v1/banks/{bank_id}/bank_transactions/pending_reconciliation":
    get:
      summary: Obtiene una lista de transacciones pendientes de conciliación
      tags:
      - Transacciones Bancarias
      security:
      - api_key: []
      parameters:
      - name: bank_id
        in: path
        required: true
        schema:
          type: integer
      - name: limit
        in: query
        required: false
        description: Número de registros a retornar
        schema:
          type: integer
      - name: date_from
        in: query
        required: false
        description: Fecha de inicio para filtrar (YYYY-MM-DD)
        schema:
          type: string
      - name: date_to
        in: query
        required: false
        description: Fecha de fin para filtrar (YYYY-MM-DD)
        schema:
          type: string
      responses:
        '200':
          description: transacciones pendientes encontradas
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      nullable: false
                    movement_id:
                      type: string
                      nullable: true
                    amount:
                      type: integer
                      nullable: true
                    transaction_date:
                      type: string
                      format: date
                      nullable: true
                    transaction_type:
                      type: string
                      nullable: true
                    pending:
                      type: boolean
                      nullable: false
                    post_date:
                      type: string
                      format: date
                      nullable: true
                    reference_id:
                      type: integer
                      nullable: true
                    comment:
                      type: string
                      nullable: true
                    conciliated:
                      type: boolean
                      nullable: false
                    bank_id:
                      type: integer
                      nullable: false
                    sender_holder_name:
                      type: string
                      nullable: true
                    sender_holder_id:
                      type: integer
                      nullable: true
                    manual:
                      type: boolean
                      nullable: false
                    was_in_process:
                      type: boolean
                      nullable: false
                    description:
                      type: string
                      nullable: true
                    created_at:
                      type: string
                      format: date
                      nullable: true
                    updated_at:
                      type: string
                      format: date
                      nullable: true
                    active:
                      type: boolean
                      nullable: false
                    recipient_holder_name:
                      type: string
                      nullable: true
                    recipient_holder_id:
                      type: integer
                      nullable: true
                    automatic_conciliation:
                      type: boolean
                      nullable: false
                    conciliation_rule_id:
                      type: integer
                      nullable: true
        '401':
          description: no autorizado
  "/api/v1/banks":
    get:
      summary: Lista todos los bancos
      tags:
      - Bancos
      security:
      - api_key: []
      responses:
        '200':
          description: bancos encontrados
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    name:
                      type: string
                    legal_id:
                      type: string
                    account_number:
                      type: string
                    active:
                      type: boolean
                    is_collector:
                      type: boolean
                    commission:
                      type: number
                    associated_bank_id:
                      type: integer
                      nullable: true
                    store_sale_default:
                      type: boolean
                    charge_default:
                      type: boolean
                    payment_default:
                      type: boolean
                    is_bank:
                      type: boolean
                    account_type_cd:
                      type: integer
                    code:
                      type: string
                      nullable: true
                    created_at:
                      type: string
                      format: date-time
                    updated_at:
                      type: string
                      format: date-time
        '401':
          description: no autorizado
  "/api/v1/banks/results":
    parameters:
    - name: date_from
      in: query
      required: false
      description: Fecha de inicio para filtrar (YYYY-MM-DD)
      schema:
        type: string
    - name: date_to
      in: query
      required: false
      description: Fecha de fin para filtrar (YYYY-MM-DD)
      schema:
        type: string
    - name: business_center_id
      in: query
      required: false
      description: Filtrar por ID de centro de negocio
      schema:
        type: integer
    - name: period_balance
      in: query
      required: false
      description: Período de balance (anual, mensual, etc.)
      schema:
        type: string
        enum:
        - annual
        - monthly
        - quarterly
    get:
      summary: Obtiene resultados bancarios
      tags:
      - Bancos
      security:
      - api_key: []
      responses:
        '200':
          description: resultados encontrados
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    account_id:
                      type: integer
                    account_name:
                      type: string
                    balance:
                      type: number
                    period:
                      type: string
                    business_center_id:
                      type: integer
                    business_center_name:
                      type: string
        '401':
          description: no autorizado
  "/api/v1/business_centers":
    get:
      summary: Lista todos los centros de negocio
      tags:
      - Centros de Negocio
      responses:
        '200':
          description: centros de negocio encontrados
          content:
            application/json:
              schema:
                type: object
                properties:
                  business_centers:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        name:
                          type: string
                        is_default:
                          type: boolean
                        active:
                          type: boolean
                        created_at:
                          type: string
                          format: date-time
                        updated_at:
                          type: string
                          format: date-time
  "/api/v1/clients":
    get:
      summary: Obtiene una lista de clientes
      tags:
      - Clientes
      security:
      - api_key: []
      parameters:
      - name: limit
        in: query
        required: false
        description: Número máximo de registros a retornar (por defecto 20)
        schema:
          type: integer
      - name: active
        in: query
        required: false
        description: Filtrar por estado activo (por defecto true)
        schema:
          type: boolean
      - name: search
        in: query
        required: false
        description: Consulta de búsqueda para filtrar clientes por código_cliente,
          nombre, rut, o información de contacto (nombre/teléfono)
        schema:
          type: string
      responses:
        '200':
          description: clientes encontrados
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      description: Identificador único del cliente en el sistema.
                        ID primario de la base de datos generado automáticamente al
                        crear un nuevo cliente.
                    name:
                      type: string
                      description: Nombre completo o razón social del cliente. Nombre
                        principal utilizado para identificar al cliente en el sistema.
                        Campo obligatorio.
                    rut:
                      type: string
                      description: Número de identificación tributaria del cliente
                        (RUT en Chile). Identificador único que debe ser único en
                        el sistema. Utilizado para facturación y cumplimiento legal.
                    activity:
                      type: string
                      nullable: true
                      description: Actividad comercial o económica del cliente. Describe
                        el tipo de negocio o industria en la que se dedica el cliente.
                    contact_email:
                      type: string
                      nullable: true
                      description: Dirección de correo electrónico principal del cliente.
                        Utilizada para comunicaciones oficiales y entrega de facturas.
                    contact_phone:
                      type: string
                      nullable: true
                      description: Número de teléfono principal del cliente. Utilizado
                        para comunicaciones telefónicas y contacto directo.
                    active:
                      type: boolean
                      description: Indica si el cliente está activo en el sistema.
                        Los clientes inactivos no pueden realizar transacciones.
                    created_at:
                      type: string
                      format: date-time
                      description: Fecha y hora cuando se creó el registro del cliente.
                        Marca de tiempo automática de cuando se creó el cliente.
                    updated_at:
                      type: string
                      format: date-time
                      description: Fecha y hora de la última actualización del registro
                        del cliente. Marca de tiempo automática de la última modificación.
                    client_area_id:
                      type: integer
                      description: Identificador del área de cliente asignada. Categoría
                        o área de negocio del cliente.
                    contact_label:
                      type: string
                      nullable: true
                      description: Etiqueta o categoría del contacto principal. Por
                        defecto es "Comercial" y se utiliza para clasificar el tipo
                        de contacto.
                    contact_2_label:
                      type: string
                      nullable: true
                      description: Etiqueta del segundo contacto. Por defecto es "Cobranza"
                        y se utiliza para contactos relacionados con pagos y cobranzas.
                    contact_2_name:
                      type: string
                      nullable: true
                      description: Nombre del segundo contacto del cliente. Utilizado
                        para contactos adicionales como gerentes de cobranza.
                    contact_2_phone:
                      type: string
                      nullable: true
                      description: Número de teléfono del segundo contacto. Utilizado
                        para contactos alternativos del cliente.
                    contact_2_email:
                      type: string
                      nullable: true
                      description: Dirección de correo electrónico del segundo contacto.
                        Utilizado para contactos alternativos del cliente.
                    discount:
                      type: number
                      nullable: true
                      description: Porcentaje de descuento predeterminado aplicado
                        al cliente. Utilizado para calcular precios con descuento
                        en cotizaciones e facturas.
                    payment_condition_id:
                      type: integer
                      nullable: true
                      description: Identificador de la condición de pago asignada
                        al cliente. Define los términos y plazos de pago para las
                        facturas del cliente.
                    tax_free:
                      type: boolean
                      nullable: false
                      description: Indica si el cliente está exento de impuestos.
                        Cuando es true, no se aplican impuestos a las facturas del
                        cliente.
                    client_code:
                      type: string
                      nullable: true
                      description: Código interno del cliente. Identificador personalizado
                        que puede utilizarse para referencias internas o sistemas
                        externos.
                    hidden_client:
                      type: boolean
                      nullable: false
                      description: Indica si el cliente está oculto en el sistema.
                        Los clientes ocultos no aparecen en listas generales pero
                        mantienen sus datos.
                    credit_line_amount:
                      type: number
                      nullable: true
                      description: Monto de la línea de crédito asignada al cliente.
                        Define el límite máximo de crédito que puede tener el cliente.
                    is_approved:
                      type: boolean
                      nullable: false
                      description: Indica si el cliente está aprobado para realizar
                        transacciones. Los clientes no aprobados requieren autorización
                        especial.
                    commission:
                      type: number
                      nullable: true
                      description: Porcentaje de comisión aplicado al cliente. Utilizado
                        para calcular comisiones de ventas y representantes.
                    gross_margin:
                      type: number
                      nullable: true
                      description: Margen bruto asignado al cliente. Utilizado para
                        calcular márgenes de ganancia en ventas al cliente.
                    client_class:
                      type: string
                      nullable: true
                      description: Clasificación del cliente (ej., Oro, Plata). Utilizado
                        para categorizar clientes según su importancia o valor.
                    total_margin:
                      type: number
                      nullable: true
                      description: Margen total asignado al cliente. Incluye todos
                        los márgenes y descuentos aplicables.
                    estadual:
                      type: string
                      nullable: true
                      description: Inscripción estatal del cliente. Información de
                        inscripción estatal para clientes brasileños.
                    cep:
                      type: string
                      nullable: true
                      description: Código Postal (CEP). Código postal brasileño del
                        cliente.
                    federation_unit:
                      type: string
                      nullable: true
                      description: Unidad federativa del cliente. Estado o provincia
                        del cliente en Brasil.
                    legal_basis_gdpr:
                      type: string
                      nullable: true
                      description: Base legal para el procesamiento de datos bajo
                        GDPR. Define la justificación legal para el manejo de datos
                        personales.
                    mail_consent_gdpr_cd:
                      type: integer
                      nullable: false
                      description: Código de consentimiento de correo electrónico
                        bajo GDPR. Indica si el cliente ha dado consentimiento para
                        recibir correos electrónicos.
                    simple_national:
                      type: boolean
                      nullable: false
                      description: Indica si el cliente está registrado en Simples
                        Nacional (Brasil). Régimen fiscal simplificado brasileño.
                    zipcode:
                      type: string
                      nullable: true
                      description: Código postal del cliente. Utilizado para direcciones
                        de envío y facturación.
                    external_id:
                      type: string
                      nullable: true
                      description: Identificador externo del cliente. ID utilizado
                        en sistemas externos o integraciones.
                    business_name:
                      type: string
                      nullable: true
                      description: Nombre comercial del cliente. Nombre alternativo
                        o comercial del negocio.
                    business_activities:
                      type: string
                      nullable: true
                      description: Actividades comerciales del cliente. Descripción
                        detallada de las actividades comerciales.
                    office_neighborhood:
                      type: string
                      nullable: true
                      description: Barrio de la oficina del cliente. Información adicional
                        de ubicación.
                    government_id_cd:
                      type: integer
                      nullable: false
                      description: Código de tipo de identificación gubernamental.
                        Define el tipo de documento de identidad del cliente.
                    exoneration_document_type_cd:
                      type: integer
                      nullable: true
                      description: Código de tipo de documento de exoneración. Define
                        el tipo de documento que justifica la exención fiscal.
                    exoneration_document_number:
                      type: string
                      nullable: true
                      description: Número del documento de exoneración. Número específico
                        del documento que justifica la exención.
                    exoneration_institution_name:
                      type: string
                      nullable: true
                      description: Nombre de la institución que emitió el documento
                        de exoneración. Entidad que autoriza la exención.
                    exoneration_emission_date:
                      type: string
                      format: date
                      nullable: true
                      description: Fecha de emisión del documento de exoneración.
                        Fecha cuando se emitió el documento de exoneración.
                    exoneration_due_date:
                      type: string
                      format: date
                      nullable: true
                      description: Fecha de vencimiento del documento de exoneración.
                        Fecha hasta la cual es válida la exención.
                    exoneration_percentage:
                      type: number
                      nullable: true
                      description: Porcentaje de exención aplicado. Porcentaje específico
                        de exención fiscal.
                    approved_by_quote:
                      type: boolean
                      nullable: false
                      description: Indica si el cliente puede ser aprobado automáticamente
                        por cotización. Control de flujo de aprobación.
                    survey_suscribed:
                      type: boolean
                      nullable: false
                      description: Indica si el cliente está suscrito a encuestas.
                        Control para el envío de encuestas de satisfacción.
                    send_confirmation:
                      type: boolean
                      nullable: false
                      description: Indica si se deben enviar confirmaciones automáticas
                        al cliente. Control de comunicaciones automáticas.
                    price_list_id:
                      type: integer
                      nullable: true
                      description: Identificador de la lista de precios asignada al
                        cliente. Define precios específicos para el cliente.
                    quote_footer_text:
                      type: string
                      nullable: true
                      description: Texto personalizado para pies de página de cotizaciones.
                        Texto específico que aparece en las cotizaciones del cliente.
                    bank_id:
                      type: integer
                      nullable: false
                      description: Identificador del banco asociado al cliente. Banco
                        principal para transacciones del cliente.
                    max_days_to_pay:
                      type: integer
                      nullable: true
                      description: Número máximo de días para pagar. Plazo máximo
                        de pago establecido para el cliente.
                    office_country:
                      type: string
                      nullable: true
                      description: País de la oficina del cliente. País donde se encuentra
                        la oficina principal.
                    cfdi_use:
                      type: string
                      nullable: true
                      description: Uso CFDI del cliente. Código de uso para facturación
                        electrónica en México.
                    automatic_collection_exclusion:
                      type: boolean
                      nullable: false
                      description: Indica si el cliente está excluido de la cobranza
                        automática. Control para el envío de correos de cobranza.
                    client_contacts:
                      type: array
                      description: Lista de contactos asociados al cliente. Cada contacto
                        incluye información como nombre, correo electrónico, teléfono
                        y vendedor asignado.
                      items:
                        type: object
                        properties:
                          id:
                            type: integer
                            nullable: true
                            description: Identificador único del contacto
                          label:
                            type: string
                            nullable: true
                            description: Etiqueta o categoría del contacto
                          name:
                            type: string
                            nullable: true
                            description: Nombre completo del contacto
                          phone:
                            type: string
                            nullable: true
                            description: Número de teléfono del contacto
                          email:
                            type: string
                            nullable: true
                            description: Dirección de correo electrónico del contacto
                          client_id:
                            type: integer
                            nullable: true
                            description: Identificador del cliente al que pertenece
                              este contacto
                          client_contact_order:
                            type: integer
                            nullable: true
                            description: Orden de prioridad del contacto
                          created_at:
                            type: string
                            format: date-time
                            nullable: true
                            description: Fecha y hora cuando se creó el contacto
                          updated_at:
                            type: string
                            format: date-time
                            nullable: true
                            description: Fecha y hora de la última actualización del
                              contacto
                          cell_phone:
                            type: string
                            nullable: true
                            description: Número de teléfono móvil del contacto
                          seller_id:
                            type: integer
                            nullable: true
                            description: Identificador del vendedor asignado al contacto
                          seller_2_id:
                            type: integer
                            nullable: true
                            description: Identificador del segundo vendedor asignado
                              al contacto
                          free_contact:
                            type: boolean
                            nullable: false
                            description: Indica si el contacto es libre (no asignado
                              a un vendedor específico)
                          pending_seller_id:
                            type: integer
                            nullable: true
                            description: Identificador del vendedor pendiente de asignación
                              para el contacto
        '401':
          description: no autorizado
    post:
      summary: Crea un nuevo cliente
      tags:
      - Clientes
      security:
      - api_key: []
      description: |
        Crea un nuevo cliente en el sistema.

        **Campos Obligatorios:**
        - `name` *: Nombre o razón social del cliente
        - `rut` *: Rol único tributario (único)
        - `client_contacts_attributes` *: Al menos un contacto (mínimo requerido)

        **Campos Opcionales:**
        - `activity`: Actividad comercial
        - `office_address`, `office_borough`, `office_city`, `office_country`: Dirección
        - `payment_condition_id`: Condiciones de pago (por defecto usa el valor del sistema si se omite)
        - `bank_id`: Banco asociado
        - `price_list_id`: Lista de precios personalizada
        - `tax_free`: Estado de exención de impuestos
        - `discount`, `commission`: Parámetros de precios
        - `credit_line_amount`, `max_days_to_pay`: Términos de crédito
        - `external_id`: Identificador de sistema externo para integraciones
        - `quote_footer_text`: Texto de pie de página personalizado para cotizaciones
        - `survey_suscribed`: Suscribir cliente a encuestas
        - `delivery_places_attributes`: Direcciones de entrega (array) - cada una con `name`, `address`, `commune`, `city`, `attention_to`

        **Campos de Contacto (en client_contacts_attributes):**
        Cada contacto debe incluir:
        - `name`: Nombre del contacto
        - `email`: Correo electrónico del contacto
        - `phone` o `cell_phone`: Número de teléfono del contacto
        - `label`: Tipo de contacto (opcional)
        - `seller_id`: Vendedor asignado (opcional)
      parameters: []
      responses:
        '201':
          description: cliente creado
        '422':
          description: solicitud inválida
        '401':
          description: no autorizado
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: "* Nombre o razón social del cliente"
                rut:
                  type: string
                  description: "* Número de identificación tributaria (único)"
                activity:
                  type: string
                  description: Actividad comercial
                office_address:
                  type: string
                  description: Dirección de oficina
                office_borough:
                  type: string
                  description: Comuna de oficina
                office_city:
                  type: string
                  description: Ciudad de oficina
                office_country:
                  type: string
                  description: País de oficina
                payment_condition_id:
                  type: integer
                  description: ID de condición de pago (opcional, por defecto usa
                    el valor del sistema)
                bank_id:
                  type: integer
                  description: ID del banco
                price_list_id:
                  type: integer
                  description: ID de lista de precios
                tax_free:
                  type: boolean
                  description: Estado de exención de impuestos
                discount:
                  type: number
                  description: Porcentaje de descuento predeterminado
                commission:
                  type: number
                  description: Porcentaje de comisión
                credit_line_amount:
                  type: number
                  description: Monto de línea de crédito
                max_days_to_pay:
                  type: integer
                  description: Días máximos de pago
                notes:
                  type: string
                  description: Notas adicionales
                external_id:
                  type: string
                  description: Identificador de sistema externo
                quote_footer_text:
                  type: string
                  description: Texto de pie de página personalizado para cotizaciones
                survey_suscribed:
                  type: boolean
                  description: Suscribirse a encuestas de satisfacción
                client_contacts_attributes:
                  type: array
                  description: "* Lista de contactos (mínimo 1 requerido)"
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                        description: Nombre del contacto
                      email:
                        type: string
                        description: Correo electrónico del contacto
                      phone:
                        type: string
                        description: Teléfono del contacto
                      cell_phone:
                        type: string
                        description: Teléfono celular del contacto
                      label:
                        type: string
                        description: Etiqueta/categoría del contacto
                      client_contact_order:
                        type: integer
                        description: Orden de prioridad del contacto
                      seller_id:
                        type: integer
                        description: ID del vendedor asignado
                      seller_2_id:
                        type: integer
                        description: ID del segundo vendedor
                delivery_places_attributes:
                  type: array
                  description: Direcciones de entrega (opcional)
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                        description: Nombre del lugar
                      address:
                        type: string
                        description: Dirección
                      commune:
                        type: string
                        description: Comuna
                      city:
                        type: string
                        description: Ciudad
                      attention_to:
                        type: string
                        description: Persona de contacto en la entrega
              required:
              - name
              - rut
              - client_contacts_attributes
