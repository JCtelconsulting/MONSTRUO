    post:
      summary: Crea una nueva cotización (proyecto)
      tags:
      - Cotizaciones
      security:
      - api_key: []
      description: |+
        Crea una nueva cotización/proyecto en el sistema.

        **Campos Requeridos:**
        - `client_id` *: ID del cliente
        - `client_contact_id` *: ID del contacto del cliente
        - `seller_id` *: ID del vendedor/usuario
        - `date_in` *: Fecha de cotización (formato YYYY-MM-DD)
        - `payment_condition_id` *: ID de condición de pago
        - `project_details_attributes` *: Lista de ítems (mínimo 1 requerido)
        - `project_delivery_attributes` *: Información de entrega

        **Campos Opcionales:**
        - `name`: Nombre de cotización/proyecto
        - `notes`: Notas internas
        - `delivery_place_attributes` (en project_delivery_attributes): Dirección de entrega con `name`, `address`, `commune`, `city`, `attention_to`
        - `date_commitment` (en project_delivery_attributes): Fecha límite de entrega
        - `turnaround_days` (en project_delivery_attributes): Tiempo de entrega en días hábiles

        **Líneas (en project_details_attributes):**
        Cada ítem debe incluir:
        - `product_id` *: ID del producto
        - `quantity` *: Número de unidades
        - `price` *: Precio unitario
        - `total_price` *: Precio total de la línea (cantidad × precio con impuesto)
        - `description`: Notas del producto (opcional, requiere `with_description: true` para ser usado)
        - `with_description`: Habilita descripción personalizada (opcional, por defecto: false)

      parameters: []
      responses:
        '200':
          description: cotización creada
        '422':
          description: solicitud inválida
        '401':
          description: no autorizado
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                client_id:
                  type: integer
                  description: "* ID del cliente"
                client_contact_id:
                  type: integer
                  description: "* ID del contacto del cliente"
                seller_id:
                  type: integer
                  description: "* ID del vendedor/usuario"
                date_in:
                  type: string
                  format: date
                  description: "* Fecha de cotización (YYYY-MM-DD)"
                payment_condition_id:
                  type: integer
                  description: "* ID de condición de pago"
                name:
                  type: string
                  description: Nombre de cotización/proyecto
                notes:
                  type: string
                  description: Notas internas
                discount:
                  type: number
                  description: Porcentaje de descuento
                gross_amount:
                  type: number
                  description: Monto total bruto
                price_final:
                  type: number
                  description: Precio final (neto)
                tax_amount:
                  type: number
                  description: Monto de impuesto
                reference_number:
                  type: string
                  description: Número de referencia externa
                warehouse_id:
                  type: integer
                  description: ID de almacén
                stage_id:
                  type: integer
                  description: ID de etapa/estado
                manager_id:
                  type: integer
                  description: ID de gerente de usuario
                urgent:
                  type: boolean
                  description: Marcar como urgente
                work_order:
                  type: boolean
                  description: Crear como orden de trabajo
                project_details_attributes:
                  type: array
                  description: "* Líneas de cotización (mínimo 1 requerido)"
                  items:
                    type: object
                    properties:
                      product_id:
                        type: integer
                        description: "* ID del producto"
                      quantity:
                        type: number
                        description: "* Cantidad"
                      price:
                        type: number
                        description: "* Precio unitario"
                      real_price:
                        type: number
                        description: Precio neto real (auto-calculado)
                      total_price:
                        type: number
                        description: "* Precio total con impuesto"
                      tax_amount:
                        type: number
                        description: Monto de impuesto para esta línea
                      discount:
                        type: number
                        description: Porcentaje de descuento
                      description:
                        type: string
                        description: Notas del producto (solo se usa si with_description
                          es true)
                      with_description:
                        type: boolean
                        description: 'Habilitar descripción personalizada del producto
                          (por defecto: false)'
                    required:
                    - product_id
                    - quantity
                    - price
                    - total_price
                project_delivery_attributes:
                  type: object
                  description: "* Información de entrega (requerido, pero puede ser
                    mínimo)"
                  properties:
                    date_commitment:
                      type: string
                      format: date
                      description: Fecha compromiso de entrega
                    turnaround_days:
                      type: integer
                      description: Tiempo de entrega en días hábiles
                    with_schedule:
                      type: boolean
                      description: Incluir programación
                      default: false
                    delivery_place_attributes:
                      type: object
                      description: Dirección de entrega (opcional)
                      properties:
                        name:
                          type: string
                          description: Nombre del lugar
                        address:
                          type: string
                          description: Dirección
                        commune:
                          type: string
                          description: Comuna/distrito
                        city:
                          type: string
                          description: Ciudad
                        attention_to:
                          type: string
                          description: Persona de contacto en entrega
              required:
              - client_id
              - client_contact_id
              - seller_id
              - date_in
              - payment_condition_id
              - project_details_attributes
              - project_delivery_attributes
