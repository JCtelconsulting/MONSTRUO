# Configuración del proyecto Monstruo (estándar moderno PEP 518/621).
#
# Por ahora solo agrupa la configuración de herramientas (tests, lint, etc.).
# No declara el repo como un paquete instalable porque el deploy es por
# docker-compose con multi-app, no como una sola distribución pip.

[tool.pytest.ini_options]
# Ejecutar tests:
#   pytest                          # todos (unitarios + integración)
#   pytest -m "not integration"     # solo unitarios (rápido, sin DB)
#   pytest -m integration           # solo integración (lento, requiere DB dev)
#   pytest <app>/tests/             # tests de una app específica

testpaths = [
    "gateway/tests",
    "ticketera/tests",
    "gta/tests",
    "fundacion/tests",
    "crm/tests",
    "erp/tests",
    "bodega/tests",
    "pmo/tests",
    "ia/tests",
    "zabbix/tests",
    "plataforma/tests",
]

markers = [
    "integration: tests que requieren DB dev real (Postgres). Más lentos. Saltar con `-m \"not integration\"`.",
]

# Mostrar warnings de deprecación pero no fallar
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning",
]

# Asyncio mode (varios tests usan asyncio)
asyncio_mode = "auto"
