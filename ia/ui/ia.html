<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ULTRON | Monstruo</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="shared/css/monstruo.css?v=75" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .chat-container {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 140px);
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .chat-history {
            flex: 1;
            padding: 1rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .chat-input-area {
            padding: 1rem;
            background: rgba(0, 0, 0, 0.3);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            gap: 0.5rem;
        }

        .chat-field {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 10px;
            border-radius: 4px;
        }

        .msg {
            padding: 0.8rem 1rem;
            border-radius: 8px;
            max-width: 80%;
            line-height: 1.4;
        }

        .msg-user {
            background: #004085;
            align-self: flex-end;
            color: #fff;
            border-bottom-right-radius: 0;
        }

        .msg-bot {
            background: #333;
            align-self: flex-start;
            color: #ddd;
            border-bottom-left-radius: 0;
            border: 1px solid #444;
        }

        .action-card {
            margin-top: 0.5rem;
            padding: 0.5rem;
            background: rgba(0, 0, 0, 0.2);
            border-left: 3px solid #007bff;
            font-size: 0.85rem;
        }
    </style>
</head>

<body class="sidebar-collapsed" data-current-module="ia">
    <header id="app-header">
        <div class="header-top">
            <h1>MONSTRUO</h1>
            <button id="sidebar-toggle" class="btn-icon"><i class="fas fa-bars"></i></button>
        </div>
        <nav id="dynamic-sidebar" class="side-nav">
        </nav>
        <div class="header-actions">
            <span id="who" class="pill"
                style="display:block; margin-bottom:10px; font-size:0.8rem; opacity:0.7;">Usuario</span>
            <div class="footer-buttons-container">
                <button id="btn-open-change-password" class="btn-account" title="Cambiar Contraseña">
                    <i class="fas fa-key"></i> <span>Cuenta</span>
                </button>
                <button id="btnLogout" class="btn-logout" title="Cerrar Sesión">
                    <i class="fas fa-sign-out-alt"></i> <span>Salir</span>
                </button>
            </div>
        </div>
    </header>

    <main>
        <div class="main-inner module-shell">
            <div class="section-header module-tabs-header module-shell-header">
                <div class="module-shell-title">
                    <h2 class="module-page-title">ULTRON Copiloto</h2>
                    <p class="module-shell-subtitle">Asistente operativo determinístico</p>
                </div>
                <div class="module-shell-actions">
                    <span id="llm-status" class="pill shell-who-pill" style="opacity:0.85;">LLM</span>
                </div>
            </div>

            <section class="section-block module-shell-content module-shell-content-fill">

                <div class="chat-container">
                    <div id="chatHistory" class="chat-history">
                        <div class="msg msg-bot">Hola, soy ULTRON. ¿En qué puedo ayudarte? <br> <small>Prueba: "crear
                                ticket", "estado sistema", "pendientes catalogo"</small></div>
                    </div>
                    <div class="chat-input-area">
                        <input id="chatInput" class="chat-field" placeholder="Escribe una orden..." autocomplete="off">
                        <button class="btn-primary" onclick="sendMessage()">Enviar</button>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script src="shared/js/utilidades.js?v=210"></script>
    <script src="shared/js/admin.js?v=5"></script>
    <script>
        function resolveServiceUrl(port, path = '/') {
            const protocol = window.location.protocol || 'http:';
            const host = window.location.hostname || '127.0.0.1';
            return `${protocol}//${host}:${port}${path}`;
        }

        function resolveActionUrl(payload = {}) {
            const isProdHost = window.location.hostname.endsWith('.telconsulting.cl');
            const envPrefix = isProdHost && window.location.pathname.startsWith('/dev') ? '/dev' : '';
            if (payload.module === 'ticketera') {
                return isProdHost
                    ? `https://ticketera.telconsulting.cl${envPrefix}/`
                    : resolveServiceUrl(9005, '/');
            }
            if (payload.module === 'bodega') {
                const suffix = payload.query || '';
                return isProdHost
                    ? `https://bodega.telconsulting.cl${envPrefix}/${suffix}`
                    : resolveServiceUrl(9007, `/${suffix}`);
            }
            return String(payload.url || '');
        }

        document.getElementById('chatInput').addEventListener('keyup', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const txt = input.value.trim();
            if (!txt) return;

            appendMsg('user', txt);
            input.value = '';

            try {
                const res = await window.fetchApi('/api/ultron/chat', {
                    method: 'POST',
                    body: JSON.stringify({ message: txt })
                });

                appendMsg('bot', res.reply);

                if (res.actions && res.actions.length > 0) {
                    res.actions.forEach(act => {
                        handleAction(act);
                    });
                }
            } catch (e) {
                appendMsg('bot', 'Error: ' + e.message);
            }
        }

        function appendMsg(role, text) {
            const hist = document.getElementById('chatHistory');
            const div = document.createElement('div');
            div.className = `msg msg-${role}`;
            div.innerHTML = text;
            hist.appendChild(div);
            hist.scrollTop = hist.scrollHeight;
        }

        function handleAction(act) {
            const hist = document.getElementById('chatHistory');
            const div = document.createElement('div');
            div.className = 'action-card';

            if (act.type === 'navigate') {
                const targetUrl = resolveActionUrl(act.payload);
                div.innerHTML = `Navegando a: <a href="${targetUrl}" style="color:#fff;">${targetUrl}</a>`;
                window.location.href = targetUrl;
            } else if (act.type === 'create_ticket_modal') {
                div.innerHTML = `Sugerencia: Crear Ticket "${act.payload.titulo}"`;
                const ticketBase = window.location.hostname.endsWith('.telconsulting.cl')
                    ? `https://ticketera.telconsulting.cl${window.location.pathname.startsWith('/dev') ? '/dev' : ''}/`
                    : resolveServiceUrl(9005, '/');
                window.location.href = `${ticketBase}?action=new&title=${encodeURIComponent(act.payload.titulo)}`;
            } else {
                div.innerText = `Accion ejecutada: ${act.type}`;
            }
            hist.appendChild(div);
            hist.scrollTop = hist.scrollHeight;
        }
        (async function checkLlm() {
            const el = document.getElementById('llm-status');
            if (!el) return;
            try {
                const res = await window.fetchApi('/api/ultron/status');
                if (res.enabled && res.ok) {
                    el.textContent = 'LLM: ON';
                    el.style.background = '#28a745';
                } else {
                    el.textContent = 'LLM: OFF';
                    el.style.background = '#6c757d';
                    el.title = res.msg || 'Disabled';
                }
            } catch (e) {
                el.textContent = 'LLM: ERR';
                el.style.background = '#dc3545';
            }
        })();
    </script>
    <script src="shared/js/sidebar.js?v=88"></script>
</body>

</html>
